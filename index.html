<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBG Complete Study Bank 2026 — MCQ + SAQ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B3A6B;--blue:#2E6DAD;--blue-lt:#D9E8F5;--blue-mid:#4a90d9;
  --teal:#1A6B5A;--teal-lt:#D4EDE8;--teal-mid:#2E9E85;
  --gold:#7B5E00;--gold-lt:#FFF3CD;
  --red:#B30000;--red-lt:#FDECEA;
  --green:#166534;--green-lt:#DCFCE7;--green-mid:#22C55E;
  --gray-bg:#F4F6FA;--border:#D8DEE9;
  --font-h:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
  --r:14px;--sh:0 4px 24px rgba(27,58,107,.10);--sh-lg:0 8px 40px rgba(27,58,107,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--gray-bg);color:#333;font-size:15px;line-height:1.6}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy),#2a5298 60%,var(--blue));color:#fff;
  padding:20px 30px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(27,58,107,.25)}
.hdr-in{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.hdr-title{font-family:var(--font-h);font-size:1.4rem;font-weight:700}
.hdr-sub{font-size:.72rem;opacity:.7;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.stats{display:flex;gap:12px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);border-radius:20px;
  padding:4px 12px;font-size:.73rem;white-space:nowrap}
.stat span{font-weight:700;color:#7ee8d0}

/* FILTER BAR */
.fbar{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:70px;z-index:90;
  box-shadow:0 2px 10px rgba(0,0,0,.04)}
.fbar-in{max-width:1300px;margin:0 auto;padding:0 30px;display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none}
.fbar-in::-webkit-scrollbar{display:none}
.fl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;
  white-space:nowrap;padding:12px 10px 12px 0;border-right:1px solid var(--border);margin-right:6px;flex-shrink:0}
.ftabs{display:flex;gap:2px;align-items:center;padding:6px 0;flex-shrink:0}
.ftab{padding:5px 12px;border-radius:7px;font-size:.76rem;font-weight:500;cursor:pointer;
  white-space:nowrap;border:none;background:transparent;color:#6b7280;font-family:var(--font-b);transition:all .18s}
.ftab:hover{background:var(--blue-lt);color:var(--navy)}
.ftab.active{background:var(--navy);color:#fff;font-weight:600}
.ftab .cnt{display:inline-block;background:rgba(255,255,255,.22);border-radius:10px;
  padding:0 5px;font-size:.65rem;margin-left:3px}
.ftab:not(.active) .cnt{background:var(--blue-lt);color:var(--blue)}
.fdiv{width:1px;height:24px;background:var(--border);margin:0 6px;flex-shrink:0}
.ftab-mcq.active{background:#1A5C3A}
.ftab-saq.active{background:#6b2d7c}

/* LAYOUT */
.main{max-width:1300px;margin:0 auto;padding:26px 30px;min-height:calc(100vh - 160px)}
.layout{display:grid;grid-template-columns:268px 1fr;gap:26px;align-items:start}

/* SIDEBAR */
.sidebar{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;
  position:sticky;top:148px;max-height:calc(100vh - 170px);display:flex;flex-direction:column}
.sb-hdr{background:var(--navy);color:#fff;padding:12px 16px;font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
.sb-scroll{overflow-y:auto;flex:1}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:#c5cfe0;border-radius:2px}
.sb-list{list-style:none}
.sb-item{font-size:.76rem;cursor:pointer;border-bottom:1px solid #f0f2f7}
.sb-item:hover .s-main{background:var(--blue-lt)}
.sb-item.active .s-main{background:var(--navy);color:#fff;font-weight:600}
.sb-item.active .s-cnt{background:rgba(255,255,255,.2);color:#fff}
.s-main{display:flex;align-items:center;gap:7px;padding:8px 16px;transition:background .15s}
.s-name{flex:1;line-height:1.3}
.s-cnt{background:var(--blue-lt);color:var(--navy);border-radius:10px;padding:1px 7px;
  font-size:.63rem;font-weight:700;flex-shrink:0}
.s-subtabs{display:none;padding:4px 10px 7px 26px;gap:4px;background:#f8fafc;border-top:1px solid #eef1f6}
.sb-item.active .s-subtabs{display:flex}
.s-stab{font-size:.68rem;font-weight:600;padding:2px 9px;border-radius:18px;border:1.5px solid var(--border);
  background:#fff;color:#6b7280;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.s-stab:hover{border-color:var(--blue);color:var(--blue)}
.s-stab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.s-stab.on.mcq-t{background:#1A5C3A;border-color:#1A5C3A}
.s-stab.on.saq-t{background:#6b2d7c;border-color:#6b2d7c}
.sb-part{background:var(--gray-bg);font-size:.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--blue);cursor:default;padding:6px 16px}
.sb-part:hover .s-main{background:var(--gray-bg)}

/* DECK INFO */
.deck-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.deck-title{font-family:var(--font-h);font-size:1.25rem;font-weight:700;color:var(--navy)}
.deck-meta{font-size:.74rem;color:#6b7280;margin-top:2px}
.deck-meta strong{color:var(--blue)}
.deck-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;
  font-family:var(--font-b);font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .18s}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--blue);transform:translateY(-1px)}
.btn-out{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.btn-out:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}

/* PROGRESS */
.prog-label{display:flex;justify-content:space-between;font-size:.71rem;color:#6b7280;margin-bottom:4px}
.prog-label strong{color:var(--teal)}
.prog-wrap{background:var(--border);border-radius:20px;height:4px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-mid));border-radius:20px;transition:width .4s}

/* ── MCQ CARD ── */
.mcq-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh-lg);overflow:hidden;min-height:400px;display:flex;flex-direction:column}
.mcq-hdr{background:linear-gradient(135deg,#1A5C3A,#2d8f5e);padding:14px 28px;color:#fff}
.mcq-badge{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.mcq-qn{font-family:var(--font-m);font-size:.76rem;background:rgba(255,255,255,.2);border-radius:12px;padding:2px 10px}
.mcq-tag{font-size:.63rem;font-weight:700;background:rgba(255,255,255,.15);border-radius:9px;padding:2px 7px;letter-spacing:.04em}
.mcq-lec{font-size:.70rem;opacity:.82;display:flex;align-items:center;gap:5px}
.mcq-lec::before{content:'📚';font-size:.68rem}
.mcq-stem{flex:1;padding:20px 28px 14px;font-family:var(--font-h);font-size:1.15rem;font-weight:600;color:var(--navy);line-height:1.45}
.mcq-tags{padding:0 28px 8px;display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:2px 9px;border-radius:9px;font-size:.66rem;font-weight:600;letter-spacing:.02em}
.tag-repeated{background:#FDE8E8;color:var(--red)}
.tag-also{background:var(--gold-lt);color:var(--gold)}
.mcq-choices{padding:0 22px 8px;display:flex;flex-direction:column;gap:7px}
.choice-btn{display:flex;align-items:flex-start;gap:11px;padding:10px 14px;border-radius:9px;
  border:2px solid var(--border);background:#fafbfd;cursor:pointer;font-family:var(--font-b);
  font-size:.86rem;color:#333;text-align:left;transition:all .2s;width:100%}
.choice-btn:hover:not(.locked){border-color:var(--blue-mid);background:var(--blue-lt);transform:translateX(2px)}
.choice-btn.locked{cursor:default}
.choice-btn.chosen-correct{border-color:var(--green-mid);background:var(--green-lt);color:var(--green)}
.choice-btn.chosen-wrong{border-color:#f87171;background:#fef2f2;color:#991b1b}
.choice-btn.reveal-correct{border-color:var(--green-mid);background:var(--green-lt);color:var(--green);animation:pg .4s ease}
@keyframes pg{0%{transform:scale(1)}50%{transform:scale(1.01)}100%{transform:scale(1)}}
.c-letter{display:flex;align-items:center;justify-content:center;min-width:27px;height:27px;border-radius:50%;
  background:var(--border);color:var(--navy);font-weight:700;font-size:.78rem;flex-shrink:0;
  margin-top:1px;transition:all .2s;font-family:var(--font-m)}
.choice-btn.chosen-correct .c-letter{background:var(--green-mid);color:#fff}
.choice-btn.chosen-wrong .c-letter{background:#f87171;color:#fff}
.choice-btn.reveal-correct .c-letter{background:var(--green-mid);color:#fff}
.c-icon{margin-left:auto;font-size:.95rem;flex-shrink:0;margin-top:1px}
.mcq-result{padding:9px 28px 7px;font-size:.78rem;font-weight:600;display:none;align-items:center;gap:7px;border-top:1px solid var(--border)}
.mcq-result.ok{color:var(--green);background:var(--green-lt);display:flex}
.mcq-result.ng{color:var(--red);background:var(--red-lt);display:flex}
.mcq-footer{border-top:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;
  justify-content:space-between;gap:9px;flex-wrap:wrap;background:#fafbfd;flex-shrink:0}
.rate-btns{display:flex;gap:7px}
.rate-btn{padding:4px 12px;border-radius:7px;font-size:.74rem;font-weight:600;cursor:pointer;
  border:1.5px solid transparent;font-family:var(--font-b);transition:all .15s}
.rb-again{background:var(--red-lt);color:var(--red);border-color:#f5c6c6}
.rb-again:hover{background:var(--red);color:#fff}
.rb-good{background:var(--gold-lt);color:var(--gold);border-color:#f0d890}
.rb-good:hover{background:var(--gold-mid, #C49A00);color:#fff}
.rb-easy{background:var(--teal-lt);color:var(--teal);border-color:#a8dcd3}
.rb-easy:hover{background:var(--teal);color:#fff}

/* ── SAQ FLIP CARD ── */
.card-stage{perspective:1200px;min-height:400px}
.card-flip{position:relative;width:100%;min-height:400px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card-flip.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;min-height:400px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--r);box-shadow:var(--sh-lg);overflow:hidden;display:flex;flex-direction:column}
.card-back{transform:rotateY(180deg)}
.card-front{background:#fff;cursor:pointer}
.cf-body{padding:36px 42px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:16px}
.q-badge{display:inline-flex;align-items:center;gap:7px;background:var(--navy);color:#fff;border-radius:18px;
  padding:4px 14px;font-size:.71rem;font-weight:600;font-family:var(--font-m);letter-spacing:.04em}
.q-badge .ttype{border-radius:10px;padding:1px 7px;font-size:.63rem;background:rgba(107,45,124,.5)}
.q-lec{font-size:.70rem;color:var(--blue);font-weight:500;display:flex;align-items:center;gap:4px}
.q-lec::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue)}
.q-text{font-family:var(--font-h);font-size:1.4rem;font-weight:600;color:var(--navy);line-height:1.38;max-width:640px}
.q-tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.q-hint{font-size:.74rem;color:#6b7280;margin-top:4px;display:flex;align-items:center;gap:5px}
.flip-cta{background:linear-gradient(135deg,var(--teal-lt),#e8f5f2);border-top:1px solid rgba(26,107,90,.12);
  padding:12px 42px;text-align:center;font-size:.74rem;color:var(--teal);font-weight:600;letter-spacing:.03em}
/* SAQ Back */
.card-back-saq{background:#fff;display:flex;flex-direction:column}
.ans-hdr{background:linear-gradient(135deg,var(--teal),var(--teal-mid));padding:14px 28px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ans-hdr-q{font-family:var(--font-h);font-size:.9rem;font-weight:600;opacity:.92;max-width:560px;line-height:1.3}
.ans-body{flex:1;padding:22px 28px;overflow-y:auto;max-height:440px}
.ans-label{font-size:.70rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);
  margin:12px 0 6px;padding:3px 10px;background:var(--teal-lt);border-radius:5px;display:inline-block}
.ans-label:first-child{margin-top:0}
.ans-pt{display:flex;gap:9px;padding:4px 0;font-size:.86rem;line-height:1.55;color:#333;
  border-bottom:1px dashed rgba(0,0,0,.06)}
.ans-pt:last-child{border-bottom:none}
.pt-bull{color:var(--teal-mid);font-weight:700;font-size:.95rem;flex-shrink:0;margin-top:1px}
.ans-footer{border-top:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;
  justify-content:space-between;gap:9px;flex-wrap:wrap;background:#fafbfd;flex-shrink:0}

/* NAV */
.card-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;
  font-family:var(--font-b);font-size:.81rem;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:#fff;color:var(--navy);transition:all .18s;box-shadow:0 2px 7px rgba(0,0,0,.06)}
.nav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);transform:translateY(-1px)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.nav-flip{background:var(--navy);color:#fff;border-color:var(--navy)}
.nav-btn.nav-flip:hover{background:var(--blue);border-color:var(--blue)}
.nav-ctr{font-size:.80rem;color:#6b7280;font-family:var(--font-m);min-width:68px;text-align:center}
.kbd-hints{display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.kh{font-size:.68rem;color:#6b7280;display:flex;align-items:center;gap:4px}
kbd{background:#fff;border:1px solid var(--border);border-radius:4px;padding:2px 5px;
  font-family:var(--font-m);font-size:.64rem;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* SCORE */
.score-overlay{display:none;position:fixed;inset:0;background:rgba(27,58,107,.6);
  backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.score-overlay.visible{display:flex}
.score-card{background:#fff;border-radius:18px;padding:40px;max-width:420px;width:90%;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:pop .35s cubic-bezier(.4,0,.2,1)}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.score-emoji{font-size:3rem;margin-bottom:8px}
.score-title{font-family:var(--font-h);font-size:1.6rem;color:var(--navy);margin-bottom:6px}
.score-sub{color:#6b7280;font-size:.86rem;margin-bottom:22px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sc-stat{background:var(--gray-bg);border-radius:10px;padding:12px 7px}
.sc-n{font-size:1.4rem;font-weight:700;font-family:var(--font-h)}
.sc-l{font-size:.66rem;color:#6b7280;font-weight:500;margin-top:2px}
.sc-stat.ag .sc-n{color:var(--red)}
.sc-stat.gd .sc-n{color:var(--gold)}
.sc-stat.ez .sc-n{color:var(--teal)}
.sc-stat.ok .sc-n{color:var(--green)}
.sc-stat.ng .sc-n{color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:60px 30px;color:#6b7280}
.empty h3{font-family:var(--font-h);font-size:1.3rem;color:var(--navy);margin-bottom:7px}

/* ANIMATIONS */
.card-enter{animation:slin .22s ease}
@keyframes slin{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:translateX(0)}}

/* RESPONSIVE */
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .hdr,.main{padding-left:16px;padding-right:16px}
  .fbar-in{padding:0 12px}
  .cf-body{padding:26px 18px}
  .q-text{font-size:1.18rem}
  .mcq-hdr,.mcq-stem,.mcq-choices,.mcq-footer,.ans-hdr,.ans-body,.ans-footer{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div>
      <div class="hdr-title">📖 OBG Complete Study Bank</div>
      <div class="hdr-sub">Obstetrics &amp; Gynaecology · MCQ + SAQ · 4th Year Clinical · 2026</div>
    </div>
    <div class="stats">
      <div class="stat">Total <span id="s-total">0</span></div>
      <div class="stat">MCQ <span id="s-mcq">0</span> · SAQ <span id="s-saq">0</span></div>
      <div class="stat">Reviewed <span id="s-rev">0</span></div>
      <div class="stat">Score <span id="s-score">—</span></div>
    </div>
  </div>
</header>

<div class="fbar">
  <div class="fbar-in">
    <span class="fl">EXAM</span>
    <div class="ftabs" id="exam-tabs">
      <button class="ftab active" data-f="all">All <span class="cnt" id="c-all">0</span></button>
      <button class="ftab" data-f="mid">Mid <span class="cnt" id="c-mid">0</span></button>
      <button class="ftab" data-f="paper1">Paper 1 <span class="cnt" id="c-p1">0</span></button>
      <button class="ftab" data-f="paper2">Paper 2 <span class="cnt" id="c-p2">0</span></button>
    </div>
    <div class="fdiv"></div>
    <span class="fl" style="margin-left:6px">PART</span>
    <div class="ftabs">
      <button class="ftab" data-f="obs">OBS <span class="cnt" id="c-obs">0</span></button>
      <button class="ftab" data-f="gyn">GYN <span class="cnt" id="c-gyn">0</span></button>
    </div>
    <div class="fdiv"></div>
    <span class="fl" style="margin-left:6px">TYPE</span>
    <div class="ftabs">
      <button class="ftab ftab-mcq" data-f="mcq">MCQ <span class="cnt" id="c-mcq">0</span></button>
      <button class="ftab ftab-saq" data-f="saq">SAQ <span class="cnt" id="c-saq">0</span></button>
    </div>
  </div>
</div>

<main class="main">
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-hdr">📚 Lectures</div>
      <div class="sb-scroll"><ul class="sb-list" id="sb-list"></ul></div>
    </aside>
    <div>
      <div class="deck-info">
        <div>
          <div class="deck-title" id="deck-title">All Questions</div>
          <div class="deck-meta" id="deck-meta"></div>
        </div>
        <div class="deck-actions">
          <button class="btn btn-out" onclick="shuffleDeck()">⇄ Shuffle</button>
          <button class="btn btn-out" onclick="resetDeck()">↺ Restart</button>
        </div>
      </div>
      <div class="prog-label">
        <span>Progress: <strong id="prog-txt">0 / 0</strong></span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="card-stage" id="card-stage"></div>
      <div class="card-nav">
        <button class="nav-btn" id="btn-prev" onclick="prevCard()">← Prev</button>
        <span class="nav-ctr" id="nav-ctr">— / —</span>
        <button class="nav-btn nav-flip" onclick="flipCurrent()" id="btn-flip">Reveal ↕</button>
        <button class="nav-btn" id="btn-next" onclick="nextCard()">Next →</button>
      </div>
      <div class="kbd-hints">
        <span class="kh"><kbd>Space</kbd> flip SAQ</span>
        <span class="kh"><kbd>←</kbd> prev</span>
        <span class="kh"><kbd>→</kbd> next</span>
        <span class="kh"><kbd>1</kbd> again &nbsp;<kbd>2</kbd> good &nbsp;<kbd>3</kbd> easy (SAQ)</span>
      </div>
    </div>
  </div>
</main>

<div class="score-overlay" id="score-overlay">
  <div class="score-card">
    <div class="score-emoji" id="sc-emoji">🎉</div>
    <div class="score-title">Deck Complete!</div>

ema"],"ans":"C","tags":[]},{"id":"mcq-gyn-72","num":"GYN Q72","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Ovarian Tumours","doctor":"Dr. كريم شاهين","date":"8 Mar","q":"The commonest complication of ovarian cyst 5x5 cm is:","choices":["Malignancy","Torsion","Infection","Rupture"],"ans":"B","tags":[]},{"id":"mcq-gyn-73","num":"GYN Q73","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Ovarian Tumours","doctor":"Dr. كريم شاهين","date":"8 Mar","q":"The following is NOT included in the sonographic features of malignancy in an ovarian mass?","choices":["Thick septa","Bilaterality","Solid areas","Clear contents and thin wall"],"ans":"D","tags":[]},{"id":"mcq-gyn-74","num":"GYN Q74","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Ovarian Tumours","doctor":"Dr. كريم شاهين","date":"8 Mar","q":"The following is NOT included in the operative features suggestive of malignancy in an ovarian mass:","choices":["Bilaterality","Fixidity","Solidity","Absence of ascites and omental nodules"],"ans":"D","tags":[]},{"id":"mcq-gyn-75","num":"GYN Q75","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Ovarian Tumours","doctor":"Dr. كريم شاهين","date":"8 Mar","q":"The commonest type of ovarian tumours in young age is:","choices":["Germ cell tumour","Epithelial tumours","Sex cord stromal tumours","Borderline ovarian tumours"],"ans":"A","tags":[]},{"id":"mcq-gyn-76","num":"GYN Q76","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Ovarian Tumours","doctor":"Dr. كريم شاهين","date":"8 Mar","q":"Krukenberg tumor is a metastatic disease to the ovaries. The most common primary site for this tumor is:","choices":["The stomach","The breast","The thyroid gland","The uterus"],"ans":"A","tags":[]},{"id":"mcq-gyn-77","num":"GYN Q77","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"Supravaginal elongation of cervix in uterine descent is due to:","choices":["Postmenopausal atrophy","Mackenrodt ligament resists traction","Increased weight of the uterus","Weakness of uterosacral ligament"],"ans":"B","tags":[]},{"id":"mcq-gyn-78","num":"GYN Q78","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"You can differentiate between 2nd & 3rd degree uterine descent by:","choices":["Malpas test","Bonneys test","Yousef test","Finger grip test"],"ans":"D","tags":[]},{"id":"mcq-gyn-79","num":"GYN Q79","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"The possible cause of vault prolapse is:","choices":["Early ambulation after hysterectomy","Infection of stump of hysterectomy","Missed enterocele","Postoperative chest infection"],"ans":"C","tags":[]},{"id":"mcq-gyn-80","num":"GYN Q80","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"Symptoms of pelvic organ prolapse may include the following:","choices":["A sensation of vaginal fullness or pressure","Sacral back pain with standing","Voiding and defecatory difficulties","Abnormal uterine bleeding"],"ans":"D","tags":[]},{"id":"mcq-gyn-81","num":"GYN Q81","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"30 years lady with 2nd degree uterine descent & early pregnancy — insert ring pessary until which gestational age as uterus can prevent its descent:","choices":["12 weeks","20 weeks","24 weeks","28 weeks"],"ans":"B","tags":[]},{"id":"mcq-gyn-82","num":"GYN Q82","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Puberty & Menopause","doctor":"Dr. حمزه محمد","date":"15 Feb","q":"Onset of puberty depends on many factors NOT including:","choices":["Weight","Nutrition","Genetics","Height"],"ans":"D","tags":[]},{"id":"mcq-gyn-83","num":"GYN Q83","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Puberty & Menopause","doctor":"Dr. حمزه محمد","date":"15 Feb","q":"The first change that happens in puberty is:","choices":["Breast budding [Thelarche]","Menses [Menarche]","Appearance of pubic hair [Pubarche]","Growth spurt in height"],"ans":"A","tags":[]},{"id":"mcq-gyn-84","num":"GYN Q84","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Puberty & Menopause","doctor":"Dr. حمزه محمد","date":"15 Feb","q":"Regarding Tanner staging of puberty, stage 1 means:","choices":["It describes what's happening to the child before any physical signs of puberty appear. The ovaries enlarge and hormone production begins.","It marks the beginning of physical development. Breast buds usually develop first. Pubic hair might start, height and weight may increase and the body becomes curvier.","Physical changes are becoming more obvious. Breast, height and weight continue and pubic hair gets coarser and darker. Vaginal discharge may start and for some girls, their period begins.","Puberty is in full swing. Breasts and pubic hair become more adult-like, nipples and areola become darker and pubic hair more triangular in shape. Menarche and ovulation usually starts now and are often irregular."],"ans":"A","tags":[]},{"id":"mcq-gyn-85","num":"GYN Q85","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Puberty & Menopause","doctor":"Dr. حمزه محمد","date":"15 Feb","q":"Regarding Tanner staging of puberty, stage 2 means:","choices":["It describes what's happening to the child before any physical signs of puberty appear. The ovaries enlarge and hormone production begins.","It marks the beginning of physical development. Breast buds usually develop first. Pubic hair might start, height and weight may increase and the body becomes curvier.","Physical changes are becoming more obvious. Breast, height and weight continue and pubic hair gets coarser and darker. Vaginal discharge may start and for some girls, their period begins.","Puberty is in full swing. Breasts and pubic hair become more adult-like, nipples and areola become darker and pubic hair more triangular in shape. Menarche and ovulation usually starts now and are often irregular."],"ans":"B","tags":[]},{"id":"mcq-gyn-86","num":"GYN Q86","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Urinary Incontinence","doctor":"Dr. احمد عزمي","date":"30 Mar","q":"The following is an important test to diagnose stress incontinence:","choices":["Urine analysis","Cystometry","Fluid chart","Urine culture"],"ans":"B","tags":[]},{"id":"mcq-gyn-87","num":"GYN Q87","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Urinary Incontinence","doctor":"Dr. احمد عزمي","date":"30 Mar","q":"Diagnosis of urethral hypermobility by:","choices":["Bonneys test","Yousef test","Marchal Marchetti test","Q-tip test"],"ans":"D","tags":[]},{"id":"mcq-gyn-88","num":"GYN Q88","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Urinary Incontinence","doctor":"Dr. احمد عزمي","date":"30 Mar","q":"The test used to diagnose hidden stress incontinence with large cystocele is:","choices":["Bonneys test","Yousef test","Marchal Marchetti test","Q-tip test"],"ans":"B","tags":[]},{"id":"mcq-gyn-89","num":"GYN Q89","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Urinary Incontinence","doctor":"Dr. احمد عزمي","date":"30 Mar","q":"If cough stress is positive with cystocele, to differentiate between weak sphincter and descent of bladder neck, you can do:","choices":["Q-tip test","Yousef test","Bonneys test","Malpas test"],"ans":"C","tags":[]},{"id":"mcq-gyn-90","num":"GYN Q90","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Uterine Fibroid","doctor":"Dr. ايمن محب","date":"28 Feb","q":"A 20 year old lady, pregnant 12 weeks, presented with lower abdominal pain. Examination revealed a mass continued with the uterus. What is the diagnosis?","choices":["Red degeneration of fibroid","Ectopic pregnancy","Uterine rupture","Abruptio placenta"],"ans":"A","tags":[]},{"id":"mcq-gyn-91","num":"GYN Q91","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Uterine Fibroid","doctor":"Dr. ايمن محب","date":"28 Feb","q":"The following is NOT considered as a type of uterine fibroid degenerations:","choices":["Red degeneration","Yellow degeneration","Calcification","Hyaline degeneration"],"ans":"B","tags":[]},{"id":"mcq-gyn-92","num":"GYN Q92","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Uterine Fibroid","doctor":"Dr. ايمن محب","date":"28 Feb","q":"Regarding uterine fibroid in pregnancy, which is INCORRECT:","choices":["Are often asymptomatic","May present with abdominal pain","May cause obstructed labor","Should be removed surgically if it becomes symptomatic"],"ans":"D","tags":[]},{"id":"mcq-gyn-93","num":"GYN Q93","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Uterine Fibroid","doctor":"Dr. ايمن محب","date":"28 Feb","q":"Criteria for medical treatment of uterine fibroid are NOT including:","choices":["Giant fibroid","Small fibroid","Contraindications for surgery","To preserve fertility"],"ans":"A","tags":[]},{"id":"mcq-gyn-94","num":"GYN Q94","cardType":"MCQ","part":"GYN","exam":"paper2","lecture":"Uterine Fibroid","doctor":"Dr. ايمن محب","date":"28 Feb","q":"Fibroid uterus NEVER presents with:","choices":["Amenorrhoea","Pelvic mass","Infertility","Polymenorrhoea"],"ans":"A","tags":[]},{"id":"obs-1","num":"Obs 1","part":"OBS","exam":"mid","lecture":"Female Reproductive Anatomy & Embryology","doctor":"Dr. محمد حكيم","date":"7 Dec","q":"Define fertilization and mention 3 functions of decidua.","tags":[],"a":[{"t":"label","v":"Fertilization"},{"t":"point","v":"**Definition:** Union of ovum and spermatozoon occurring in the **ampulla of the fallopian tube**, forming a diploid zygote (46 chromosomes)."},{"t":"label","v":"3 Functions of Decidua"},{"t":"point","v":"**Nutritive:** Provides nutrients to the early embryo (histiotrophic nutrition) before placental circulation is established."},{"t":"point","v":"**Protective:** Acts as a mechanical cushion and immunological barrier preventing rejection of the semi-allograft."},{"t":"point","v":"**Endocrine:** Secretes **prolactin, relaxin, and prostaglandins** to regulate pregnancy."}],"cardType":"SAQ"},{"id":"obs-2","num":"Obs 2","part":"OBS","exam":"mid","lecture":"Placental Hormones & Maternal Physiological Changes","doctor":"Dr. هبه حسن","date":"7 Dec","q":"Define 3 functions of placenta and mention 3 placental abnormalities.","tags":[],"a":[{"t":"label","v":"3 Functions of Placenta"},{"t":"point","v":"**Respiratory:** O₂/CO₂ exchange between maternal and fetal blood by simple diffusion."},{"t":"point","v":"**Nutritive:** Transfer of glucose, amino acids, fatty acids, electrolytes, vitamins, and water to the fetus."},{"t":"point","v":"**Endocrine:** Secretes **hCG, hPL, estrogen, and progesterone** to maintain pregnancy."},{"t":"label","v":"3 Placental Abnormalities"},{"t":"point","v":"**Placenta praevia** — implantation over or near the internal os."},{"t":"point","v":"**Placenta accreta/increta/percreta** — abnormal myometrial invasion."},{"t":"point","v":"**Placental abruption** — premature separation of normally implanted placenta."}],"cardType":"SAQ"},{"id":"obs-3","num":"Obs 3","part":"OBS","exam":"mid","lecture":"Female Reproductive Anatomy & Embryology","doctor":"Dr. محمد حكيم","date":"7 Dec","q":"Mention 4 functions of HCG.","tags":[],"a":[{"t":"point","v":"**Maintains corpus luteum** — sustains progesterone production in the first 8–10 weeks."},{"t":"point","v":"**Basis of pregnancy tests** (urine and serum beta-hCG assays)."},{"t":"point","v":"**Stimulates fetal testicular testosterone** — essential for male sex differentiation."},{"t":"point","v":"**Thyrotrophic activity** — weak TSH-like effect; causes hyperthyroidism in molar pregnancy."}],"cardType":"SAQ"},{"id":"obs-4","num":"Obs 4","part":"OBS","exam":"mid","lecture":"Diagnosis of Pregnancy","doctor":"Dr. علاء جمال","date":"13 Dec","q":"Mention 4 sure signs of pregnancy.","tags":[],"a":[{"t":"point","v":"**Fetal heart sounds** heard by Doppler or Pinard stethoscope."},{"t":"point","v":"**Fetal movements felt by the examiner** on abdominal palpation."},{"t":"point","v":"**Visualisation of the fetus** by ultrasound — gestational sac, embryo, or cardiac activity."},{"t":"point","v":"**Fetal parts palpable** on abdominal examination (late pregnancy)."}],"cardType":"SAQ"},{"id":"obs-5","num":"Obs 5","part":"OBS","exam":"mid","lecture":"Antenatal Care (ANC)","doctor":"Dr. محمد صلاح","date":"13 Dec","q":"Define high risk pregnancy and mention 4 medical causes.","tags":[],"a":[{"t":"point","v":"**Definition:** A pregnancy with an increased likelihood of adverse maternal or fetal outcome compared to the general obstetric population, requiring additional surveillance."},{"t":"label","v":"4 Medical Causes"},{"t":"point","v":"**Diabetes mellitus** (pre-gestational or gestational) — risk of macrosomia, congenital anomalies."},{"t":"point","v":"**Hypertensive disorders** (chronic hypertension, pre-eclampsia) — risk of IUGR, abruption."},{"t":"point","v":"**Cardiac disease** (congenital or acquired) — risk of heart failure, maternal mortality."},{"t":"point","v":"**Anaemia** (severe iron deficiency, haemoglobinopathies e.g. sickle cell disease)."}],"cardType":"SAQ"},{"id":"obs-6","num":"Obs 6","part":"OBS","exam":"mid","lecture":"Antenatal Care (ANC)","doctor":"Dr. محمد صلاح","date":"13 Dec","q":"Define non-engagement of the head and mention its causes (4 fetal & 3 maternal causes).","tags":[{"cls":"tag-also","txt":"↔ Also in Normal Labour"}],"a":[{"t":"point","v":"**Definition:** The fetal head is NOT engaged when its widest diameter (BPD) has NOT passed through the pelvic inlet — presenting part remains above the ischial spines."},{"t":"label","v":"4 Fetal Causes"},{"t":"point","v":"Malpresentation (breech, brow, face, shoulder)."},{"t":"point","v":"Macrocephaly / hydrocephalus."},{"t":"point","v":"Fetal macrosomia."},{"t":"point","v":"Anencephaly (in some cases)."},{"t":"label","v":"3 Maternal Causes"},{"t":"point","v":"**Contracted pelvis (CPD)** — most important cause."},{"t":"point","v":"Pelvic tumour (fibroid, ovarian cyst) occupying the pelvis."},{"t":"point","v":"Placenta praevia — blocking the inlet."}],"cardType":"SAQ"},{"id":"obs-7","num":"Obs 7","part":"OBS","exam":"mid","lecture":"Diagnosis of Pregnancy","doctor":"Dr. علاء جمال","date":"13 Dec","q":"Define 2 methods to calculate EDD & mention 3 causes of fundal level more than EDD.","tags":[{"cls":"tag-also","txt":"↔ Also in ANC"}],"a":[{"t":"label","v":"2 Methods to Calculate EDD"},{"t":"point","v":"**Naegele's Rule:** LMP + 9 months + 7 days (or LMP + 280 days). Most common clinical method."},{"t":"point","v":"**First trimester ultrasound:** Crown-rump length (CRL) measurement — most accurate if LMP is uncertain or irregular cycles."},{"t":"label","v":"3 Causes of Fundal Level Greater than Expected"},{"t":"point","v":"**Multiple pregnancy** (twins/triplets) — additional fetal volumes."},{"t":"point","v":"**Polyhydramnios** — excess amniotic fluid (AFI > 24 cm)."},{"t":"point","v":"**Large-for-dates fetus** (macrosomia e.g. in DM) / **molar pregnancy** / **fibroid uterus**."}],"cardType":"SAQ"},{"id":"obs-8","num":"Obs 8","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Define septic abortion & mention 3 complications & lines of treatment.","tags":[],"a":[{"t":"point","v":"**Definition:** Any abortion complicated by **intrauterine infection** — endometritis extending to parametrium, peritoneum, or systemically."},{"t":"label","v":"3 Complications"},{"t":"point","v":"**Septicaemia / endotoxic shock** — most dangerous complication."},{"t":"point","v":"**DIC** (Disseminated intravascular coagulation)."},{"t":"point","v":"**Acute renal failure** — from septic emboli and septic shock."},{"t":"label","v":"Lines of Treatment"},{"t":"point","v":"**Stabilise:** IV fluids, correct coagulopathy, blood transfusion if needed."},{"t":"point","v":"**Broad-spectrum IV antibiotics** (ampicillin + gentamicin + metronidazole) for 24 hours **before** evacuation."},{"t":"point","v":"**Evacuation of uterus** by suction curettage after antibiotic coverage."}],"cardType":"SAQ"},{"id":"obs-9","num":"Obs 9","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Define recurrent abortion & mention 3 most common causes.","tags":[],"a":[{"t":"point","v":"**Definition:** **3 or more consecutive (successive) spontaneous abortions** before 20 weeks of gestation."},{"t":"label","v":"3 Most Common Causes"},{"t":"point","v":"**Antiphospholipid antibody syndrome (APS)** — most common treatable cause; thrombotic thrombocytopenic events."},{"t":"point","v":"**Uterine anomalies** — septate uterus (most common structural), bicornuate uterus, submucous fibroids, Asherman's syndrome."},{"t":"point","v":"**Parental chromosomal abnormalities** — balanced translocation in either parent."}],"cardType":"SAQ"},{"id":"obs-10","num":"Obs 10","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Define abortion & mention most common fetal cause.","tags":[],"a":[{"t":"point","v":"**Definition:** Expulsion or extraction of the conceptus from the uterus **before 20 weeks** of gestation (or fetal weight < 500 g)."},{"t":"point","v":"**Most common fetal cause: Chromosomal abnormalities** — account for ~50–60% of first trimester abortions. The most common chromosomal defect is **trisomy 16**."}],"cardType":"SAQ"},{"id":"obs-11","num":"Obs 11","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Define Cervical incompetence & mention 3 causes & how to manage such case.","tags":[],"a":[{"t":"point","v":"**Definition:** Painless, passive cervical dilatation and shortening in the **second trimester**, leading to recurrent mid-trimester pregnancy loss — without uterine contractions."},{"t":"label","v":"3 Causes"},{"t":"point","v":"**Congenital:** Müllerian duct anomalies, collagen disorders (Ehlers-Danlos syndrome)."},{"t":"point","v":"**Traumatic:** Previous cervical surgery (LLETZ, cone biopsy, D&C), forceful dilatation."},{"t":"point","v":"**Hormonal:** DES (diethylstilboestrol) exposure in utero."},{"t":"label","v":"Management"},{"t":"point","v":"**Cervical cerclage** (McDonald or Shirodkar suture) at **12–14 weeks** — treatment of choice. Removed at 36–37 weeks."},{"t":"point","v":"Progesterone supplementation (adjunct). Serial cervical length monitoring by transvaginal ultrasound."}],"cardType":"SAQ"},{"id":"obs-12","num":"Obs 12","part":"OBS","exam":"mid","lecture":"Ectopic Pregnancy","doctor":"Dr. حسام الدين شوقي","date":"14 Dec","q":"Define Ectopic pregnancy and mention most common site.","tags":[],"a":[{"t":"point","v":"**Definition:** Implantation of the fertilised ovum **outside the uterine cavity**."},{"t":"point","v":"**Most common site: Fallopian tube** (95–98%), specifically the **ampulla** (> 80% of tubal ectopic pregnancies)."}],"cardType":"SAQ"},{"id":"obs-13","num":"Obs 13","part":"OBS","exam":"mid","lecture":"Ectopic Pregnancy","doctor":"Dr. حسام الدين شوقي","date":"14 Dec","q":"Mention 3 most common causes of Ectopic pregnancy.","tags":[],"a":[{"t":"point","v":"**Previous PID / salpingitis** — most common cause; tubal scarring and adhesions impair ovum transport."},{"t":"point","v":"**Previous tubal surgery** — sterilisation reversal, salpingostomy, or any prior tubal operation."},{"t":"point","v":"**Previous ectopic pregnancy** — recurrence risk approximately 10–15%."}],"cardType":"SAQ"},{"id":"obs-14","num":"Obs 14","part":"OBS","exam":"mid","lecture":"Ectopic Pregnancy","doctor":"Dr. حسام الدين شوقي","date":"14 Dec","q":"Mention 2 methods of investigations of Ectopic pregnancy.","tags":[],"a":[{"t":"point","v":"**Serum β-hCG:** If β-hCG > discriminatory zone (1,500–2,000 IU/L) with no intrauterine pregnancy on TVU → highly suspicious for ectopic. Serial doubling in 48h distinguishes from normal IUP."},{"t":"point","v":"**Transvaginal ultrasound (TVU):** Confirms empty uterus; may visualise adnexal mass, tubal ring sign, or free fluid in the Pouch of Douglas."}],"cardType":"SAQ"},{"id":"obs-15","num":"Obs 15","part":"OBS","exam":"mid","lecture":"Ectopic Pregnancy","doctor":"Dr. حسام الدين شوقي","date":"14 Dec","q":"Mention 2 lines of treatment of Ectopic pregnancy.","tags":[],"a":[{"t":"point","v":"**Medical: Methotrexate** (IM injection) — folic acid antagonist. For unruptured ectopic, haemodynamically stable patient, β-hCG < 5,000 IU/L, no fetal cardiac activity, mass < 3.5 cm."},{"t":"point","v":"**Surgical:** Laparoscopic **salpingostomy** (tube-conserving, for fertility preservation) or **salpingectomy** (definitive). Laparotomy is reserved for haemodynamically unstable patients."}],"cardType":"SAQ"},{"id":"obs-16","num":"Obs 16","part":"OBS","exam":"mid","lecture":"Ectopic Pregnancy","doctor":"Dr. حسام الدين شوقي","date":"14 Dec","q":"Mention 3 prerequisites to start medical treatment to a case of Ectopic pregnancy.","tags":[],"a":[{"t":"point","v":"**Haemodynamically stable** patient — no signs of rupture or haemorrhagic shock."},{"t":"point","v":"**Unruptured ectopic** confirmed on TVU with **no fetal cardiac activity** and mass < 3.5 cm."},{"t":"point","v":"**Serum β-hCG < 5,000 IU/L** (some protocols up to 10,000). Also: normal renal, hepatic, and haematological function; compliant patient for follow-up."}],"cardType":"SAQ"},{"id":"obs-17","num":"Obs 17","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Mention 3 symptoms of vesicular mole & 3 differences between vesicular and partial mole.","tags":[],"a":[{"t":"label","v":"3 Symptoms of Complete (Vesicular) Mole"},{"t":"point","v":"**Vaginal bleeding** — most common presentation; brownish 'prune juice' discharge."},{"t":"point","v":"**Uterus larger than dates** — due to vesicles and theca lutein cysts."},{"t":"point","v":"**Hyperemesis gravidarum** — from very high β-hCG levels."},{"t":"label","v":"3 Differences: Complete vs Partial Mole"},{"t":"point","v":"**Karyotype:** Complete = **46,XX** (androgenic diploid) | Partial = **69,XXY** (triploid)."},{"t":"point","v":"**Fetal tissue:** Complete = **absent** | Partial = **present** (non-viable fetus or fetal parts)."},{"t":"point","v":"**Malignant potential:** Complete = **higher (~15–20%)** | Partial = **lower (~0.5–5%)."}],"cardType":"SAQ"},{"id":"obs-18","num":"Obs 18","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Most common line of treatment of vesicular mole & mention how to follow up such case after treatment.","tags":[],"a":[{"t":"label","v":"Treatment"},{"t":"point","v":"**Suction evacuation under sonographic guidance** — procedure of choice under general anaesthesia + IV oxytocin post-evacuation."},{"t":"point","v":"Anti-D Ig if Rh-negative. Contraception: **Combined OCP** (not IUCD — until β-hCG normalises)."},{"t":"label","v":"Follow-Up"},{"t":"point","v":"**Serial serum β-hCG** every 1–2 weeks until **3 consecutive normal values**, then monthly for 6–12 months."},{"t":"point","v":"Avoid pregnancy for **6–12 months** (complete mole) / **6 months** (partial mole)."},{"t":"point","v":"CXR at baseline. Initiate chemotherapy if β-hCG plateaus, rises, or metastasis is detected (gestational trophoblastic neoplasia)."}],"cardType":"SAQ"},{"id":"obs-19","num":"Obs 19","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Define APH and mention 3 causes.","tags":[],"a":[{"t":"point","v":"**Definition:** Any bleeding from the genital tract **after 24 weeks of gestation** and before the delivery of the baby. Significant APH is > 50 mL."},{"t":"label","v":"3 Causes"},{"t":"point","v":"**Placenta praevia** — placenta implanted over or near the internal cervical os."},{"t":"point","v":"**Placental abruption** — premature separation of normally implanted placenta."},{"t":"point","v":"**Vasa praevia** — fetal vessels traverse the membranes over the internal os. *(Also: cervical causes, uterine rupture, show.)*"}],"cardType":"SAQ"},{"id":"obs-20","num":"Obs 20","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Define Vasa previa & how to manage.","tags":[],"a":[{"t":"point","v":"**Definition:** Fetal blood vessels (from velamentous cord insertion or succenturiate placenta) traverse the fetal membranes **over the internal cervical os**, unsupported by placenta or umbilical cord."},{"t":"label","v":"Management"},{"t":"point","v":"**Antepartum:** Diagnose by transvaginal Doppler ultrasound. Admit at 30–32 weeks, give corticosteroids."},{"t":"point","v":"**Delivery:** Elective **cesarean section at 34–36 weeks** — or immediately upon diagnosis if fetal compromise or rupture of membranes occurs."},{"t":"point","v":"**At rupture of membranes with bleeding:** Emergency CS immediately — fetal mortality approaches 60% with vaginal delivery."}],"cardType":"SAQ"},{"id":"obs-21","num":"Obs 21","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Mention 3 clinical pictures of placenta previa and mention 2 methods of investigations.","tags":[],"a":[{"t":"label","v":"3 Clinical Pictures"},{"t":"point","v":"**Painless, bright red vaginal bleeding** — characteristically spontaneous, painless, and recurrent."},{"t":"point","v":"**Malpresentation / high presenting part** — fetus unable to engage due to placenta occupying the lower segment."},{"t":"point","v":"**Soft, non-tender uterus** — no uterine tenderness, unless concurrent abruption."},{"t":"label","v":"2 Methods of Investigation"},{"t":"point","v":"**Transvaginal Ultrasound (TVU)** — gold standard. Most accurate for placental localisation (> 95% accurate)."},{"t":"point","v":"**Transabdominal Ultrasound** — initial screening; TVU required for confirmation. MRI may be used if accreta suspected."}],"cardType":"SAQ"},{"id":"obs-22","num":"Obs 22","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Define each of placenta accreta, increta & percreta.","tags":[],"a":[{"t":"point","v":"**Placenta accreta:** Chorionic villi attach to the myometrium **without penetrating** it (abnormal adherence). Most common (80%)."},{"t":"point","v":"**Placenta increta:** Chorionic villi **invade into the myometrium** (15%)."},{"t":"point","v":"**Placenta percreta:** Chorionic villi **penetrate through the full thickness of the myometrium** and may invade adjacent organs (bladder, bowel) (5%). Most severe — highest maternal mortality."}],"cardType":"SAQ"},{"id":"obs-23","num":"Obs 23","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Mention 3 fetal & 3 maternal complications of placenta previa.","tags":[],"a":[{"t":"label","v":"3 Fetal Complications"},{"t":"point","v":"**Prematurity** — most common; from preterm delivery or premature rupture of membranes."},{"t":"point","v":"**Intrauterine growth restriction (IUGR)** — due to impaired placental function."},{"t":"point","v":"**Fetal hypoxia / fetal distress** — from maternal haemorrhage."},{"t":"label","v":"3 Maternal Complications"},{"t":"point","v":"**Antepartum and postpartum haemorrhage** — most common; lower segment does not contract well."},{"t":"point","v":"**Placenta accreta spectrum** — common when praevia overlies a uterine scar."},{"t":"point","v":"**Maternal mortality** — from haemorrhage, coagulopathy, or complications of emergency surgery."}],"cardType":"SAQ"},{"id":"obs-24","num":"Obs 24","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Define Placental abruption & 3 causes and 3 fetal and 3 maternal complications.","tags":[],"a":[{"t":"point","v":"**Definition:** Premature separation of a **normally implanted placenta** before delivery of the fetus — after 20 weeks."},{"t":"label","v":"3 Causes"},{"t":"point","v":"**Hypertensive disorders** (pre-eclampsia, chronic HTN) — most common."},{"t":"point","v":"**Abdominal trauma** (direct or deceleration injury)."},{"t":"point","v":"**Sudden decompression of the uterus** — e.g. rupture of membranes in polyhydramnios."},{"t":"label","v":"3 Fetal Complications"},{"t":"point","v":"**Fetal hypoxia / asphyxia** — placental separation reduces gas exchange."},{"t":"point","v":"**Prematurity** — from emergency delivery."},{"t":"point","v":"**Intrauterine fetal death (IUFD)** — in severe cases."},{"t":"label","v":"3 Maternal Complications"},{"t":"point","v":"**Haemorrhagic shock** — from concealed or revealed haemorrhage."},{"t":"point","v":"**DIC** — from release of thromboplastin from the placenta."},{"t":"point","v":"**Acute renal failure (Renal cortical necrosis)** — from prolonged hypotension and DIC."}],"cardType":"SAQ"},{"id":"obs-25","num":"Obs 25","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Define PPH & mention 4 causes.","tags":[],"a":[{"t":"point","v":"**Definition:** Blood loss of **≥ 500 mL after vaginal delivery** or **≥ 1,000 mL after cesarean section** within 24 hours. Severe PPH = > 1,000 mL."},{"t":"label","v":"4 Causes (The 4 Ts)"},{"t":"point","v":"**Tone (Uterine atony)** — most common cause (~70–80%). Uterus fails to contract after delivery."},{"t":"point","v":"**Trauma** — lacerations of the cervix, vagina, perineum, or uterine rupture."},{"t":"point","v":"**Tissue** — retained placenta or placental fragments preventing uterine contraction."},{"t":"point","v":"**Thrombin** — coagulopathy (DIC, pre-existing clotting disorders, anticoagulants)."}],"cardType":"SAQ"},{"id":"obs-26","num":"Obs 26","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Define 2ry PPH and mention most common cause.","tags":[{"cls":"tag-repeated","txt":"★ Also SAQ 51"}],"a":[{"t":"point","v":"**Definition:** Abnormal or excessive bleeding from the birth canal **between 24 hours and 12 weeks** after delivery."},{"t":"point","v":"**Most common cause: Retained placental tissue or membranes** — leads to subinvolution of the placental site and prevents haemostasis."},{"t":"point","v":"Other causes: Endometritis, trophoblastic disease (choriocarcinoma), coagulopathy."}],"cardType":"SAQ"},{"id":"obs-27","num":"Obs 27","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Causes of atonic PPH (3 fetal & 3 maternal causes).","tags":[],"a":[{"t":"label","v":"3 Fetal Causes"},{"t":"point","v":"**Fetal macrosomia** — overstretches the uterus reducing its ability to contract."},{"t":"point","v":"**Multiple pregnancy** — over-distended uterus from twins/triplets."},{"t":"point","v":"**Polyhydramnios** — excessive amniotic fluid causing uterine overdistension."},{"t":"label","v":"3 Maternal Causes"},{"t":"point","v":"**Prolonged or augmented labour** — exhausted myometrium."},{"t":"point","v":"**General anaesthesia / uterine relaxants** — halogenated agents cause uterine relaxation."},{"t":"point","v":"**Uterine anomalies or fibroids** — prevent uniform contraction."}],"cardType":"SAQ"},{"id":"obs-28","num":"Obs 28","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Mention degrees of perineal tear.","tags":[{"cls":"tag-also","txt":"↔ Also in Genital Fistulas"}],"a":[{"t":"point","v":"**1st degree:** Injury to skin and superficial perineal body only — no muscle involved. Minimal bleeding."},{"t":"point","v":"**2nd degree:** Injury to perineum involving the perineal muscles (bulbocavernosus, transverse perinei) but NOT the anal sphincter."},{"t":"point","v":"**3rd degree:** Involves the anal sphincter complex. 3a: < 50% external sphincter. 3b: > 50% external sphincter. 3c: Internal sphincter involved."},{"t":"point","v":"**4th degree:** Complete disruption of the anal sphincter complex AND rectal epithelium."}],"cardType":"SAQ"},{"id":"obs-29","num":"Obs 29","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Define retained placenta & mention 3 causes and how to manage each cause.","tags":[{"cls":"tag-repeated","txt":"★ Also SAQ 45"}],"a":[{"t":"point","v":"**Definition:** Failure of the placenta to deliver within **30 minutes** after birth of the baby (during the third stage of labour)."},{"t":"label","v":"Cause 1: Placenta Adherens (Morbid adhesion)"},{"t":"point","v":"Management: Manual removal of placenta under anaesthesia."},{"t":"label","v":"Cause 2: Trapped Placenta (Cervical spasm)"},{"t":"point","v":"Management: Glyceryl trinitrate (GTN) sublingual or IV to relax the cervix, then manual removal."},{"t":"label","v":"Cause 3: Uterine Atony (placenta separated but not expelled)"},{"t":"point","v":"Management: Encourage breastfeeding (oxytocin release), controlled cord traction, IV oxytocin. If failed → manual removal."}],"cardType":"SAQ"},{"id":"obs-30","num":"Obs 30","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Define DIC & mention 5 causes in obstetrics.","tags":[{"cls":"tag-also","txt":"↔ Also in Cardiac Disorders"}],"a":[{"t":"point","v":"**Definition:** Disseminated Intravascular Coagulation — systemic activation of coagulation cascade, leading to simultaneous **microvascular thrombosis** (ischaemia) and **consumption of clotting factors** (haemorrhage)."},{"t":"label","v":"5 Obstetric Causes"},{"t":"point","v":"**Placental abruption** — most common obstetric cause; release of thromboplastins."},{"t":"point","v":"**Amniotic fluid embolism** — entry of amniotic fluid into maternal circulation."},{"t":"point","v":"**Severe pre-eclampsia / eclampsia / HELLP syndrome.**"},{"t":"point","v":"**Intrauterine fetal death (IUFD)** — prolonged retention releases thromboplastins."},{"t":"point","v":"**Septic abortion / postpartum sepsis** — bacterial endotoxins activate coagulation."}],"cardType":"SAQ"},{"id":"obs-31","num":"Obs 31","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Mention 4 causes of sudden postpartum collapse.","tags":[],"a":[{"t":"point","v":"**Postpartum haemorrhage** — massive blood loss from uterine atony, trauma, or coagulopathy."},{"t":"point","v":"**Pulmonary embolism** — thromboembolism in the immediate postpartum period."},{"t":"point","v":"**Amniotic fluid embolism** — sudden cardiovascular collapse, hypoxia, DIC."},{"t":"point","v":"**Eclamptic seizure** — postpartum eclampsia (may occur up to 6 weeks after delivery)."}],"cardType":"SAQ"},{"id":"obs-32","num":"Obs 32","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"Define pre-eclampsia and enumerate 4 risk factors.","tags":[],"a":[{"t":"point","v":"**Definition:** New-onset **hypertension** (BP ≥ 140/90 mmHg on 2 occasions ≥ 4 hours apart) **after 20 weeks** gestation, with **proteinuria** (≥ 300 mg/24h) or end-organ dysfunction."},{"t":"label","v":"4 Risk Factors"},{"t":"point","v":"**Nulliparity / first pregnancy with new partner** — most common risk factor."},{"t":"point","v":"**Multiple pregnancy** (twins, triplets)."},{"t":"point","v":"**Chronic hypertension or renal disease.**"},{"t":"point","v":"**Previous pre-eclampsia or positive family history.** Also: obesity (BMI > 30), diabetes, APS, age > 40."}],"cardType":"SAQ"},{"id":"obs-33","num":"Obs 33","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"Define gestational hypertension and its differences from pre-eclampsia.","tags":[],"a":[{"t":"point","v":"**Gestational HTN:** New-onset hypertension (BP ≥ 140/90 mmHg) **after 20 weeks**, WITHOUT proteinuria or end-organ damage, resolving by 12 weeks postpartum."},{"t":"label","v":"Key Differences"},{"t":"point","v":"**Proteinuria:** Absent in gestational HTN | Present in pre-eclampsia (≥ 300 mg/24h)."},{"t":"point","v":"**End-organ dysfunction:** Absent in gestational HTN | Present in severe PE (renal, hepatic, neurological, haematological)."},{"t":"point","v":"**Prognosis:** Gestational HTN is generally benign; approximately 25% progress to pre-eclampsia and resolves postpartum."}],"cardType":"SAQ"},{"id":"obs-34","num":"Obs 34","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"Mention 4 warning symptoms of pre-eclampsia.","tags":[],"a":[{"t":"point","v":"**Severe headache** — frontal or occipital, not relieved by analgesia; indicates cerebral oedema or vasospasm."},{"t":"point","v":"**Visual disturbances** — blurring, flashing lights (scotomata), or diplopia; indicates retinal vasospasm."},{"t":"point","v":"**Epigastric or right upper quadrant pain** — hepatic subcapsular haematoma or hepatic oedema."},{"t":"point","v":"**Sudden oedema** — rapid weight gain, facial/hand swelling. Also: oliguria < 500 mL/24h, nausea and vomiting."}],"cardType":"SAQ"},{"id":"obs-35","num":"Obs 35","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"What is the EDEN criteria for bad prognosis of pre-eclampsia?","tags":[],"a":[{"t":"point","v":"**EDEN** criteria indicate severe, poor-prognosis pre-eclampsia:"},{"t":"point","v":"**E — Elevated liver enzymes** (AST/ALT > 2× upper limit of normal) — hepatic involvement."},{"t":"point","v":"**D — Diastolic BP ≥ 110 mmHg** — severe hypertension."},{"t":"point","v":"**E — Eclampsia** — onset of seizures."},{"t":"point","v":"**N — Neonatal complications** — IUGR, oligohydramnios, abnormal Doppler. *(Also: proteinuria > 5g/24h, oliguria < 500mL/24h, thrombocytopenia < 100,000, HELLP syndrome.)*"}],"cardType":"SAQ"},{"id":"obs-36","num":"Obs 36","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"Define 4 indications for termination of pregnancy in pre-eclampsia.","tags":[],"a":[{"t":"point","v":"**Gestational age ≥ 37 weeks** with pre-eclampsia — delivery is definitive treatment."},{"t":"point","v":"**Severe pre-eclampsia at any gestational age** unresponsive to treatment — maternal safety takes priority."},{"t":"point","v":"**Eclampsia** — seizures mandate delivery after maternal stabilisation."},{"t":"point","v":"**Fetal compromise** — IUGR with abnormal Doppler, absent/reversed end-diastolic flow, non-reassuring CTG."}],"cardType":"SAQ"},{"id":"obs-37","num":"Obs 37","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Define APH and mention 3 causes. (★ REPEATED — same as SAQ 19)","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Definition:** Any bleeding from the genital tract **after 24 weeks of gestation** and before the delivery of the baby."},{"t":"label","v":"3 Causes"},{"t":"point","v":"**Placenta praevia** — placenta implanted over or near the internal cervical os."},{"t":"point","v":"**Placental abruption** — premature separation of normally implanted placenta."},{"t":"point","v":"**Vasa praevia** — fetal vessels traverse the membranes over the internal os."}],"cardType":"SAQ"},{"id":"obs-38","num":"Obs 38","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Define Vasa previa. (★ REPEATED — same as SAQ 20)","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Definition:** Fetal blood vessels (from velamentous cord insertion or succenturiate placenta lobe) traverse the fetal membranes **over the internal cervical os**, unsupported by placenta or umbilical cord Wharton's jelly."},{"t":"point","v":"**Significance:** Vessel rupture at amniotomy or spontaneous membrane rupture → rapid fetal exsanguination (fetal mortality > 60% without recognition)."},{"t":"point","v":"**Diagnosis:** Transvaginal colour Doppler ultrasound."},{"t":"point","v":"**Management:** Elective cesarean section at 34–36 weeks."}],"cardType":"SAQ"},{"id":"obs-39","num":"Obs 39","part":"OBS","exam":"mid","lecture":"Cardiac Disorders & Anaemia with Pregnancy","doctor":"Dr. عيسى محمود","date":"28 Dec","q":"Enumerate classes of heart disease in pregnancy (NYHA classification).","tags":[],"a":[{"t":"point","v":"**Class I:** No symptoms at rest or with ordinary physical activity. No limitation of physical activity."},{"t":"point","v":"**Class II:** Slight limitation. Comfortable at rest; ordinary activity causes symptoms (dyspnoea, palpitation, angina)."},{"t":"point","v":"**Class III:** Marked limitation. Comfortable at rest; less-than-ordinary activity causes symptoms."},{"t":"point","v":"**Class IV:** Symptoms at rest. Any physical activity causes discomfort. Pregnancy is contraindicated in Class III/IV."}],"cardType":"SAQ"},{"id":"obs-40","num":"Obs 40","part":"OBS","exam":"mid","lecture":"Diabetes with Pregnancy","doctor":"Dr. أمير عبد الله","date":"21 Dec","q":"Define gestational diabetes and enumerate 4 indications for CS in diabetic patient.","tags":[],"a":[{"t":"point","v":"**Definition:** Carbohydrate intolerance first diagnosed or recognised **during pregnancy**, regardless of whether insulin is used or whether it persists postpartum (ADA/WHO criteria: 2-hour OGTT glucose ≥ 153 mg/dL)."},{"t":"label","v":"4 Indications for CS in Diabetic Patient"},{"t":"point","v":"**Macrosomia** — estimated fetal weight > 4.5 kg to avoid shoulder dystocia."},{"t":"point","v":"**Previous CS** or uterine scar."},{"t":"point","v":"**Obstetric indications** — malpresentation, CPD."},{"t":"point","v":"**Poorly controlled diabetes with fetal compromise** — IUGR, abnormal CTG or Doppler."}],"cardType":"SAQ"},{"id":"obs-41","num":"Obs 41","part":"OBS","exam":"mid","lecture":"Diabetes with Pregnancy","doctor":"Dr. أمير عبد الله","date":"21 Dec","q":"Enumerate 4 fetal complications of diabetic patient.","tags":[],"a":[{"t":"point","v":"**Macrosomia (LGA)** — from fetal hyperinsulinaemia → risk of shoulder dystocia, birth trauma."},{"t":"point","v":"**Congenital anomalies** — cardiac defects (VSD, TGA), NTDs, **caudal regression syndrome** (pathognomonic for DM)."},{"t":"point","v":"**Respiratory Distress Syndrome (RDS)** — delayed lung maturity (insulin inhibits surfactant synthesis) despite term gestation."},{"t":"point","v":"**Neonatal hypoglycaemia** — fetal hyperinsulinaemia persists after cord clamping. Also: polycythaemia, hyperbilirubinaemia, IUFD."}],"cardType":"SAQ"},{"id":"obs-42","num":"Obs 42","part":"OBS","exam":"paper1","lecture":"Abnormal Labour","doctor":"Dr. عماد عبد المعطي","date":"18 Jan","q":"Enumerate 3 risk factors of cord prolapse.","tags":[],"a":[{"t":"point","v":"**Malpresentation** — footling breech, transverse lie, unstable lie. Presenting part does not fill the lower segment."},{"t":"point","v":"**Polyhydramnios** — cord displaced by excess fluid, especially on rupture of membranes."},{"t":"point","v":"**Premature rupture of membranes (PROM)** or **artificial rupture of membranes** before engagement. Also: multiparity, low birthweight, multiple pregnancy."}],"cardType":"SAQ"},{"id":"obs-43","num":"Obs 43","part":"OBS","exam":"paper1","lecture":"Abnormal Labour","doctor":"Dr. عماد عبد المعطي","date":"18 Jan","q":"Mention 3 causes of uterine inertia.","tags":[{"cls":"tag-also","txt":"↔ Also in PPH"}],"a":[{"t":"point","v":"**Primary uterine inertia:** Hypotonic uterine dysfunction from the onset of labour — common in primigravidae; cause often unknown (hormonal imbalance, anxiety)."},{"t":"point","v":"**Overdistension of the uterus** — multiple pregnancy, polyhydramnios, macrosomia — muscle fibres stretched beyond optimal length."},{"t":"point","v":"**Obstruction** — mechanical obstruction (CPD, malpresentation) causes reflex inhibition of contractions. Also: sedatives/analgesics, abnormal uterine anatomy."}],"cardType":"SAQ"},{"id":"obs-44","num":"Obs 44","part":"OBS","exam":"paper1","lecture":"Abnormal Labour","doctor":"Dr. عماد عبد المعطي","date":"18 Jan","q":"Define obstructed labour, and how to manage.","tags":[],"a":[{"t":"point","v":"**Definition:** Labour in which, despite strong uterine contractions, the fetus **cannot descend** through the birth canal due to mechanical obstruction."},{"t":"label","v":"Management"},{"t":"point","v":"**Stabilise:** IV fluids, urinary catheter, correct dehydration and electrolyte imbalance."},{"t":"point","v":"**If baby alive:** Emergency cesarean section (most appropriate in most cases)."},{"t":"point","v":"**If baby dead:** Destructive operations (craniotomy, embryotomy) may be performed by skilled operator to avoid CS risk."},{"t":"point","v":"**Post-delivery:** Antibiotics, repair of uterine/birth canal injuries, manage PPH."}],"cardType":"SAQ"},{"id":"obs-45","num":"Obs 45","part":"OBS","exam":"paper1","lecture":"Abnormal Labour","doctor":"Dr. عماد عبد المعطي","date":"18 Jan","q":"How to manage retained placenta. (★ REPEATED — same as SAQ 29)","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Wait 30 minutes** — if no postpartum haemorrhage, allow further time for spontaneous delivery."},{"t":"point","v":"**IV oxytocin** — stimulates uterine contraction to expel placenta; controlled cord traction."},{"t":"point","v":"**Manual removal of placenta** — under general or spinal anaesthesia if above measures fail. Confirmed consent, empty bladder, antibiotic cover."},{"t":"point","v":"If **placenta accreta** suspected: Do NOT attempt manual removal forcefully → risk of haemorrhage. Hysterectomy may be required."}],"cardType":"SAQ"},{"id":"obs-46","num":"Obs 46","part":"OBS","exam":"paper1","lecture":"Abnormal Labour","doctor":"Dr. عماد عبد المعطي","date":"18 Jan","q":"Define 3 causes of acute abdomen in 3rd trimester.","tags":[{"cls":"tag-also","txt":"↔ Also in Ectopic Pregnancy"}],"a":[{"t":"point","v":"**Placental abruption** — sudden onset severe abdominal pain, rigid 'woody' uterus, uterine tenderness with or without vaginal bleeding."},{"t":"point","v":"**Uterine rupture** — sudden tearing abdominal pain, cessation of contractions, fetal distress, haemoperitoneum; usually in scarred uterus."},{"t":"point","v":"**Red degeneration of uterine fibroid** — acute central necrosis during pregnancy; severe localised tenderness over fibroid, fever, leucocytosis. Also: acute appendicitis, ovarian cyst torsion."}],"cardType":"SAQ"},{"id":"obs-47","num":"Obs 47","part":"OBS","exam":"mid","lecture":"Female Reproductive Anatomy & Embryology","doctor":"Dr. محمد حكيم","date":"7 Dec","q":"Define fertilization & implantation. (★ REPEATED)","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"label","v":"Fertilization"},{"t":"point","v":"Union of sperm and ovum in the **ampulla of the fallopian tube**; forms a **diploid zygote** (46 chromosomes). Occurs within 24–48 hours of ovulation."},{"t":"label","v":"Implantation"},{"t":"point","v":"Embedding of the **blastocyst** into the **endometrium (decidua)**, occurring **6–10 days** after fertilization."},{"t":"point","v":"**Most common site:** Posterior wall of the upper uterine body."},{"t":"point","v":"**Process:** Apposition → Adhesion → Invasion (trophoblast invades decidua and spiral arteries)."}],"cardType":"SAQ"},{"id":"obs-48","num":"Obs 48","part":"OBS","exam":"mid","lecture":"Abortion & Vesicular Mole","doctor":"Dr. هيثم بهاء","date":"14 Dec","q":"Enumerate 3 complications of vesicular mole.","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Gestational Trophoblastic Neoplasia (GTN)** — invasive mole (~15%), choriocarcinoma (~2.5%). Most important complication."},{"t":"point","v":"**Theca-lutein cysts** — bilateral ovarian enlargement from high β-hCG; usually regress spontaneously after evacuation."},{"t":"point","v":"**Uterine perforation** during evacuation / haemorrhage. Also: pre-eclampsia before 20 weeks, thyrotoxicosis, DIC."}],"cardType":"SAQ"},{"id":"obs-49","num":"Obs 49","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"Mention 3 signs of magnesium sulphate toxicity.","tags":[],"a":[{"t":"point","v":"**Loss of patellar reflexes (absent knee jerk)** — first sign of toxicity (serum Mg > 7–8 mEq/L). Monitor reflexes before each dose."},{"t":"point","v":"**Respiratory depression** — reduced respiratory rate < 16/min (serum Mg > 10–12 mEq/L). Risk of respiratory arrest."},{"t":"point","v":"**Oliguria** — urine output < 25 mL/hour indicates reduced renal clearance and accumulation. **Antidote: Calcium gluconate** 1g IV over 10 minutes."}],"cardType":"SAQ"},{"id":"obs-50","num":"Obs 50","part":"OBS","exam":"paper1","lecture":"Abnormal Labour","doctor":"Dr. عماد عبد المعطي","date":"18 Jan","q":"Causes of prolonged 2nd stage (4 causes).","tags":[],"a":[{"t":"point","v":"**Inadequate uterine contractions** (uterine inertia) — weak, infrequent expulsive efforts."},{"t":"point","v":"**Malposition / malpresentation** — occipito-posterior position, deep transverse arrest, face/brow presentation."},{"t":"point","v":"**Cephalopelvic disproportion (CPD)** — fetal head too large for maternal pelvis."},{"t":"point","v":"**Inadequate maternal expulsive efforts** — poor bearing-down, epidural analgesia reducing urge, exhaustion."}],"cardType":"SAQ"},{"id":"obs-51","num":"Obs 51","part":"OBS","exam":"paper1","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Define 2ry PPH and enumerate 3 causes. (★ REPEATED — same as SAQ 26)","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Definition:** Abnormal or excessive uterine bleeding occurring **between 24 hours and 12 weeks** after delivery of the baby."},{"t":"label","v":"3 Causes"},{"t":"point","v":"**Retained placental tissue** — most common cause; prevents normal uterine involution and haemostasis."},{"t":"point","v":"**Endometritis** — infection of the uterine lining causing subinvolution and bleeding."},{"t":"point","v":"**Gestational trophoblastic disease** — choriocarcinoma presenting with late PPH."}],"cardType":"SAQ"},{"id":"obs-52","num":"Obs 52","part":"OBS","exam":"paper1","lecture":"Operative Vaginal Delivery","doctor":"Dr. محمد يحيي","date":"8 Feb","q":"Mention 3 complications of forceps delivery.","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"label","v":"Maternal Complications"},{"t":"point","v":"**Perineal and vaginal lacerations** — including 3rd and 4th degree tears; cervical tears."},{"t":"point","v":"**Urinary tract injury** — bladder or urethral damage; urinary incontinence."},{"t":"label","v":"Fetal Complications"},{"t":"point","v":"**Facial nerve palsy** — pressure on the nerve by forceps blades; usually transient."},{"t":"point","v":"**Cephalhaematoma / intracranial haemorrhage** — from traction and compression forces. Also: skull fracture, facial bruising."}],"cardType":"SAQ"},{"id":"obs-53","num":"Obs 53","part":"OBS","exam":"mid","lecture":"Caesarean Section (CS)","doctor":"Dr. ايناس مصطفى","date":"28 Dec","q":"Enumerate 4 absolute maternal indications for CS.","tags":[{"cls":"tag-also","txt":"↔ Also in Abnormal Labour"}],"a":[{"t":"point","v":"**Placenta praevia (major)** — placenta covering the internal os; vaginal delivery impossible."},{"t":"point","v":"**Absolute cephalopelvic disproportion (CPD)** — contracted pelvis where vaginal delivery is not possible."},{"t":"point","v":"**Previous classical (upper segment) cesarean section** — risk of scar rupture with labour; VBAC contraindicated."},{"t":"point","v":"**Obstructed labour with live fetus** — when destructive operations are inappropriate or unavailable. Also: cord prolapse with live fetus, transverse lie at term."}],"cardType":"SAQ"},{"id":"obs-54","num":"Obs 54","part":"OBS","exam":"paper1","lecture":"Operative Vaginal Delivery","doctor":"Dr. محمد يحيي","date":"8 Feb","q":"Mention 4 prerequisites for forceps application.","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Fully dilated cervix** — no cervix around the fetal head."},{"t":"point","v":"**Ruptured membranes** — direct contact between blades and fetal head."},{"t":"point","v":"**Engaged fetal head** — presenting part at or below the ischial spines (station 0 or below)."},{"t":"point","v":"**Known position of the fetal head** — to correctly apply forceps. Also: adequate pelvis, empty bladder, maternal consent, adequate analgesia."}],"cardType":"SAQ"},{"id":"obs-55","num":"Obs 55","part":"OBS","exam":"paper1","lecture":"Operative Vaginal Delivery","doctor":"Dr. محمد يحيي","date":"8 Feb","q":"Mention 3 complications of ventouse.","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"label","v":"Fetal Complications"},{"t":"point","v":"**Cephalhaematoma** — subperiosteal bleeding from cup pressure; more common than with forceps."},{"t":"point","v":"**Chignon (caput)** — circular oedema under the cup; self-limiting and resolves in 24–48 hours."},{"t":"label","v":"Maternal Complications"},{"t":"point","v":"**Perineal/vaginal lacerations** — from uncontrolled delivery. Also: subgaleal haemorrhage (rare but serious), failure of delivery requiring forceps or CS."}],"cardType":"SAQ"},{"id":"obs-56","num":"Obs 56","part":"OBS","exam":"paper1","lecture":"Operative Vaginal Delivery","doctor":"Dr. محمد يحيي","date":"8 Feb","q":"Define episiotomy and mention 4 indications.","tags":[{"cls":"tag-repeated","txt":"★ Repeated"}],"a":[{"t":"point","v":"**Definition:** A surgical incision of the perineum and posterior vaginal wall, performed during the second stage of labour to enlarge the vaginal outlet."},{"t":"label","v":"4 Indications"},{"t":"point","v":"**Fetal distress** — to expedite delivery when there is acute fetal compromise."},{"t":"point","v":"**Operative vaginal delivery** — forceps or ventouse application to prevent irregular tears."},{"t":"point","v":"**Rigid perineum** — threatening to tear with advancing presenting part; primiparous women with perineal resistance."},{"t":"point","v":"**Shoulder dystocia** — to facilitate internal manoeuvres. Also: breech delivery, preterm delivery."}],"cardType":"SAQ"},{"id":"obs-57","num":"Obs 57","part":"OBS","exam":"paper1","lecture":"Malpresentation & Malposition","doctor":"Dr. محمد هاني","date":"11 Jan","q":"Define ECV and 3 contraindications.","tags":[],"a":[{"t":"point","v":"**Definition:** External Cephalic Version — a procedure performed at **≥ 37 weeks** to convert a breech or transverse presentation to cephalic by applying external manipulation to the maternal abdomen, to reduce the need for CS."},{"t":"label","v":"3 Contraindications"},{"t":"point","v":"**Previous cesarean section or uterine scar** — risk of uterine rupture during manipulation."},{"t":"point","v":"**Placenta praevia** — risk of placental separation during manipulation."},{"t":"point","v":"**Multiple pregnancy, PROM, severe oligohydramnios, fetal compromise.** Also: hypertensive disorders, abnormal FHR."}],"cardType":"SAQ"},{"id":"obs-58","num":"Obs 58","part":"OBS","exam":"mid","lecture":"Cardiac Disorders & Anaemia with Pregnancy","doctor":"Dr. عيسى محمود","date":"28 Dec","q":"Mention 4 signs of heart failure in pregnancy.","tags":[],"a":[{"t":"point","v":"**Progressive dyspnoea** — especially orthopnoea (unable to lie flat) and PND (paroxysmal nocturnal dyspnoea)."},{"t":"point","v":"**Basal crepitations** — fine crackles at lung bases indicating pulmonary oedema."},{"t":"point","v":"**Tachycardia** — resting heart rate > 100 bpm; persistent despite rest."},{"t":"point","v":"**Raised JVP / peripheral oedema** — jugular venous distension, dependent oedema out of proportion to normal pregnancy. Also: cardiomegaly on CXR, gallop rhythm."}],"cardType":"SAQ"},{"id":"obs-59","num":"Obs 59","part":"OBS","exam":"paper1","lecture":"RH Incompatibility","doctor":"Dr. عبد الرحمن حجازي","date":"11 Jan","q":"Mention 3 indications for anti-D administration in Rh negative mothers.","tags":[],"a":[{"t":"point","v":"**After delivery of an Rh-positive baby** — 300 mcg within 72 hours postpartum; prevents sensitisation."},{"t":"point","v":"**After any sensitising event in pregnancy** — miscarriage, termination, ectopic pregnancy, amniocentesis, CVS, antepartum haemorrhage, external cephalic version, trauma."},{"t":"point","v":"**Antenatal prophylaxis** — routine administration at 28 and 34 weeks (2 doses of 100–125 mcg) even in absence of sensitising events."}],"cardType":"SAQ"},{"id":"obs-60","num":"Obs 60","part":"OBS","exam":"paper1","lecture":"Intrapartum Fetal Monitoring, VTE & Thyroid","doctor":"Dr. هاني حسن / Dr. محمد عادل","date":"3 Jan","q":"Define asymptomatic bacteriuria and the most common organism.","tags":[],"a":[{"t":"point","v":"**Definition:** The presence of **≥ 10⁵ colony-forming units/mL of bacteria** in a mid-stream urine specimen from a patient with **no symptoms** of urinary tract infection."},{"t":"point","v":"**Prevalence in pregnancy:** 2–10%; important because 25–40% of untreated cases progress to symptomatic UTI or pyelonephritis."},{"t":"point","v":"**Most common organism: Escherichia coli** — accounts for ~80% of cases. Others: Klebsiella, Group B Streptococcus, Staphylococcus saprophyticus."}],"cardType":"SAQ"},{"id":"obs-61","num":"Obs 61","part":"OBS","exam":"mid","lecture":"Hypertensive Disorders with Pregnancy","doctor":"Dr. سعد الجيلاني","date":"21 Dec","q":"Mention 3 lab findings in HELLP syndrome.","tags":[],"a":[{"t":"point","v":"**H — Haemolysis:** Peripheral blood smear shows microangiopathic haemolytic anaemia (schistocytes, burr cells); elevated bilirubin; elevated LDH > 600 IU/L."},{"t":"point","v":"**EL — Elevated Liver enzymes:** AST/ALT > 70 IU/L (> 2× upper normal limit). May cause epigastric pain."},{"t":"point","v":"**LP — Low Platelets:** Platelet count < 100,000/μL (thrombocytopenia). Risk of bleeding complications."}],"cardType":"SAQ"},{"id":"obs-62","num":"Obs 62","part":"OBS","exam":"mid","lecture":"Antenatal Care (ANC)","doctor":"Dr. محمد صلاح","date":"13 Dec","q":"Enumerate 3 mandatory tests must be performed during 1st ANC visit.","tags":[],"a":[{"t":"point","v":"**Blood group and Rh typing** — identifies Rh-negative women requiring anti-D prophylaxis; ABO compatibility."},{"t":"point","v":"**Haemoglobin / CBC** — screens for anaemia; establishes baseline; detects haemoglobinopathies."},{"t":"point","v":"**Urine analysis and culture** — screens for asymptomatic bacteriuria (treat to prevent pyelonephritis). Also mandatory: VDRL/RPR (syphilis), HIV, hepatitis B, rubella titre, blood sugar."}],"cardType":"SAQ"},{"id":"obs-63","num":"Obs 63","part":"OBS","exam":"mid","lecture":"Placental Hormones & Maternal Physiological Changes","doctor":"Dr. هبه حسن","date":"7 Dec","q":"Define endocrine function of placenta and mention 2 hormones produced by it.","tags":[],"a":[{"t":"point","v":"**Endocrine function:** The placenta acts as a **temporary endocrine organ**, secreting peptide and steroid hormones essential for maintaining pregnancy, supporting fetal development, and preparing the mother for labour and lactation."},{"t":"point","v":"**hCG (Human Chorionic Gonadotropin):** Produced by syncytiotrophoblast. Maintains corpus luteum progesterone production for the first 8–10 weeks; basis of pregnancy tests."},{"t":"point","v":"**hPL (Human Placental Lactogen):** Promotes maternal lipolysis to spare glucose and amino acids for the fetus; has GH-like and prolactin-like effects
