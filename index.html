; rises throughout pregnancy."}],"cardType":"SAQ"},{"id":"obs-64","num":"Obs 64","part":"OBS","exam":"paper1","lecture":"Normal Labour","doctor":"Dr. مؤمن محمد","date":"4 Jan","q":"Define 1st stage of labour and specify its 2 phases.","tags":[],"a":[{"t":"point","v":"**Definition:** The first stage of labour begins with the **onset of regular painful uterine contractions** and ends with **full dilatation of the cervix** (10 cm)."},{"t":"label","v":"2 Phases"},{"t":"point","v":"**Latent phase:** From onset of labour to 3–4 cm cervical dilatation. Duration: up to **8 hours** in primiparous and **6 hours** in multiparous women. Cervical effacement predominates."},{"t":"point","v":"**Active phase:** From 3–4 cm to full dilatation (10 cm). Rate of dilatation ≥ 1 cm/hour (primigravida: 10–16 hours total first stage). Descent of presenting part begins."}],"cardType":"SAQ"},{"id":"obs-65","num":"Obs 65","part":"OBS","exam":"paper1","lecture":"Normal Labour","doctor":"Dr. مؤمن محمد","date":"4 Jan","q":"Mention 4 differences between true and false labour pain.","tags":[{"cls":"tag-repeated","txt":"★ Also in ANC SAQ 64"}],"a":[{"t":"point","v":"**Regularity:** True = regular, progressive frequency and duration | False = irregular, no progression."},{"t":"point","v":"**Cervical change:** True = progressive effacement and dilatation | False = no cervical change."},{"t":"point","v":"**Intensity:** True = progressively stronger and longer | False = variable, do not intensify."},{"t":"point","v":"**Location and radiation:** True = starts in back, radiates to lower abdomen | False = mainly lower abdomen/groin only. Effect of sedation: false labour stops, true labour continues."}],"cardType":"SAQ"},{"id":"obs-66","num":"Obs 66","part":"OBS","exam":"mid","lecture":"Antepartum Hemorrhage (APH)","doctor":"Dr. عبد الباسط فخري","date":"28 Dec","q":"Compare between placenta previa and abruption regarding pain and character of bleeding.","tags":[],"a":[{"t":"label","v":"Pain"},{"t":"point","v":"**Placenta praevia:** PAINLESS bleeding — no uterine contractions; soft, non-tender uterus."},{"t":"point","v":"**Placental abruption:** PAINFUL — severe, constant, tearing abdominal pain; uterus is rigid, hypertonic, and very tender ('woody hard' uterus)."},{"t":"label","v":"Character of Bleeding"},{"t":"point","v":"**Placenta praevia:** REVEALED — bright red, fresh blood visible per vaginum. Amount correlates with clinical state. Never do vaginal examination."},{"t":"point","v":"**Placental abruption:** May be CONCEALED (80%) — dark blood trapped behind placenta; degree of shock exceeds visible blood loss. Or revealed — dark, old blood."}],"cardType":"SAQ"},{"id":"obs-67","num":"Obs 67","part":"OBS","exam":"paper1","lecture":"Multiple Pregnancy","doctor":"Dr. احمد رضا","date":"11 Jan","q":"Define TTT syndrome and list 2 of its ultrasound diagnostic features.","tags":[{"cls":"tag-repeated","txt":"★ Also in Normal Labour"}],"a":[{"t":"point","v":"**Twin-to-Twin Transfusion Syndrome (TTTS):** A complication of **monochorionic** twin pregnancies where arteriovenous anastomoses result in net blood transfusion from **donor twin** (hypovolaemic, IUGR, oligohydramnios) to **recipient twin** (hypervolaemic, macrosomia, polyhydramnios)."},{"t":"label","v":"2 Ultrasound Diagnostic Features"},{"t":"point","v":"**Polyhydramnios** in recipient twin's sac (DVP > 8 cm after 20 weeks) AND **oligohydramnios / anhydramnios** in donor twin's sac (DVP < 2 cm) — the 'stuck twin'."},{"t":"point","v":"**Significant size discordance** — > 20% difference in estimated fetal weights between the two twins in a monochorionic pregnancy."}],"cardType":"SAQ"},{"id":"obs-68","num":"Obs 68","part":"OBS","exam":"paper1","lecture":"Post-term Pregnancy / IUGR","doctor":"Dr. محمد حسن","date":"7 Feb","q":"Define IUGR and distinguish between symmetrical and non-symmetrical IUGR.","tags":[{"cls":"tag-also","txt":"↔ Also in Abnormal Labour"}],"a":[{"t":"point","v":"**Definition:** Intrauterine Growth Restriction — estimated fetal weight **< 10th percentile** for gestational age, or abdominal circumference < 10th percentile, with evidence of compromise."},{"t":"label","v":"Symmetrical (Type I) IUGR"},{"t":"point","v":"All fetal parameters proportionately reduced (head, abdomen, long bones). Occurs **early** in pregnancy. Cause: chromosomal abnormalities, congenital infections (TORCH), severe early malnutrition. Brain sparing is **absent** — poor prognosis."},{"t":"label","v":"Asymmetrical (Type II) IUGR"},{"t":"point","v":"Head circumference is relatively preserved ('brain sparing') while abdominal circumference is reduced. Occurs **late** in pregnancy. Cause: uteroplacental insufficiency (hypertension, DM, smoking). Better prognosis with delivery."}],"cardType":"SAQ"},{"id":"obs-69","num":"Obs 69","part":"OBS","exam":"mid","lecture":"Diabetes with Pregnancy","doctor":"Dr. أمير عبد الله","date":"21 Dec","q":"Define shoulder dystocia and mention 3 risk factors.","tags":[{"cls":"tag-also","txt":"↔ Also in Abnormal Labour"}],"a":[{"t":"point","v":"**Definition:** After delivery of the fetal head, **failure of spontaneous delivery of the shoulders** requiring additional manoeuvres (anterior shoulder impacted against the maternal pubic symphysis)."},{"t":"label","v":"3 Risk Factors"},{"t":"point","v":"**Fetal macrosomia** (> 4 kg) — most important risk factor."},{"t":"point","v":"**Maternal gestational or pre-gestational diabetes** — promotes macrosomia with disproportionate shoulder size."},{"t":"point","v":"**Previous shoulder dystocia** — recurrence risk ~10–17%. Also: operative vaginal delivery, prolonged 2nd stage, maternal obesity."}],"cardType":"SAQ"},{"id":"obs-70","num":"Obs 70","part":"OBS","exam":"paper1","lecture":"Operative Vaginal Delivery","doctor":"Dr. محمد يحيي","date":"8 Feb","q":"Enumerate 3 indications for episiotomy and 3 complications.","tags":[{"cls":"tag-repeated","txt":"★ Repeated — same as SAQ 56"}],"a":[{"t":"label","v":"3 Indications"},{"t":"point","v":"**Fetal distress** — to expedite delivery when CTG shows non-reassuring pattern."},{"t":"point","v":"**Operative vaginal delivery** — forceps or ventouse to prevent irregular perineal tears."},{"t":"point","v":"**Rigid perineum or imminent 3rd/4th degree tear** — anticipated severe laceration."},{"t":"label","v":"3 Complications"},{"t":"point","v":"**Haemorrhage** — from wound edges or extension of the incision."},{"t":"point","v":"**Infection / wound dehiscence** — contamination from bowel flora; poor healing."},{"t":"point","v":"**Extension** — episiotomy may extend to a 3rd or 4th degree tear. Also: dyspareunia, haematoma, perineal pain."}],"cardType":"SAQ"},{"id":"gyn-1","num":"Gyn 1","part":"GYN","exam":"paper2","lecture":"Female Reproductive Anatomy & Embryology","doctor":"Dr. محمد حكيم","date":"7 Dec","q":"Mention blood supply of both fallopian tube and ovary.","tags":[],"a":[{"t":"label","v":"Fallopian Tube Blood Supply"},{"t":"point","v":"**Arterial:** Tubal branches of the **uterine artery** (medial 2/3) and **ovarian artery** (lateral 1/3) — anastomose within the mesosalpinx."},{"t":"point","v":"**Venous drainage:** Into the uterine and ovarian veins."},{"t":"label","v":"Ovary Blood Supply"},{"t":"point","v":"**Arterial:** **Ovarian artery** — directly from the aorta below the renal arteries. Also receives anastomotic branch from uterine artery."},{"t":"point","v":"**Venous drainage:** **Right ovarian vein** → inferior vena cava. **Left ovarian vein** → left renal vein."}],"cardType":"SAQ"},{"id":"gyn-2","num":"Gyn 2","part":"GYN","exam":"paper2","lecture":"Puberty & Menopause","doctor":"Dr. حمزه محمد","date":"15 Feb","q":"Define precocious puberty and its main types.","tags":[],"a":[{"t":"point","v":"**Definition:** Development of secondary sexual characteristics **before the age of 8 years in girls** (or 9 in boys)."},{"t":"label","v":"Main Types"},{"t":"point","v":"**Central (GnRH-dependent) precocious puberty:** Premature activation of the hypothalamic-pituitary-gonadal axis → FSH/LH dependent. Most common type in girls (80% idiopathic). Also: CNS tumours, McCune-Albright syndrome."},{"t":"point","v":"**Peripheral (GnRH-independent) precocious puberty:** Sex steroids produced independently of the HPG axis. Causes: adrenal tumours, ovarian tumours, exogenous hormones, McCune-Albright syndrome."}],"cardType":"SAQ"},{"id":"gyn-3","num":"Gyn 3","part":"GYN","exam":"paper2","lecture":"Abnormal Uterine Bleeding (AUB)","doctor":"Dr. احمد عبد الغني","date":"22 Feb","q":"Define menorrhagia and metrorrhagia.","tags":[],"a":[{"t":"point","v":"**Menorrhagia:** Cyclical (regular) menstrual bleeding that is excessive in **amount** (> 80 mL/cycle) or **duration** (> 7 days), at regular intervals. Cycle length is normal (21–35 days)."},{"t":"point","v":"**Metrorrhagia:** Bleeding that occurs at **irregular intervals** between expected menstrual periods — irregular inter-menstrual bleeding. Cycle timing is abnormal."},{"t":"point","v":"**(Menometrorrhagia):** Combination — irregular, prolonged, and excessive bleeding."}],"cardType":"SAQ"},{"id":"gyn-3b","num":"Gyn 3b","part":"GYN","exam":"paper2","lecture":"PCO, Hyperprolactinemia & Hirsutism","doctor":"Dr. محمود حسني","date":"22 Feb","q":"Diagnostic criteria of PCOS.","tags":[],"a":[{"t":"point","v":"**Rotterdam Criteria (2003) — 2 of 3 required:**"},{"t":"point","v":"1. **Oligo- or anovulation** — irregular cycles (< 8 cycles/year or cycle length > 35 days)."},{"t":"point","v":"2. **Clinical or biochemical hyperandrogenism** — hirsutism (Ferriman-Gallwey score > 8), acne, alopecia; or elevated serum testosterone/DHEAS."},{"t":"point","v":"3. **Polycystic ovarian morphology on ultrasound** — ≥ 12 follicles (2–9 mm) per ovary OR ovarian volume > 10 mL. After exclusion of other causes (thyroid disease, hyperprolactinaemia, CAH, androgen-secreting tumours)."}],"cardType":"SAQ"},{"id":"gyn-4","num":"Gyn 4","part":"GYN","exam":"paper2","lecture":"Abnormal Uterine Bleeding (AUB)","doctor":"Dr. احمد عبد الغني","date":"22 Feb","q":"Define PALM-COEIN classification of AUB.","tags":[],"a":[{"t":"point","v":"**PALM (Structural causes):**"},{"t":"point","v":"**P** — Polyp | **A** — Adenomyosis | **L** — Leiomyoma (fibroid) | **M** — Malignancy & hyperplasia."},{"t":"point","v":"**COEIN (Non-structural causes):**"},{"t":"point","v":"**C** — Coagulopathy | **O** — Ovulatory dysfunction | **E** — Endometrial | **I** — Iatrogenic | **N** — Not yet classified."},{"t":"point","v":"This FIGO classification system (2011) provides a structured approach to investigating and documenting causes of abnormal uterine bleeding."}],"cardType":"SAQ"},{"id":"gyn-5","num":"Gyn 5","part":"GYN","exam":"paper2","lecture":"Abnormal Uterine Bleeding (AUB)","doctor":"Dr. احمد عبد الغني","date":"22 Feb","q":"Define PALM-COEIN classification of AUB. (Listed separately in original)","tags":[],"a":[{"t":"point","v":"**PALM (Structural causes):**"},{"t":"point","v":"**P** — Polyp (endometrial or endocervical). **A** — Adenomyosis. **L** — Leiomyoma (submucosal most symptomatic). **M** — Malignancy & hyperplasia (endometrial carcinoma, sarcoma)."},{"t":"point","v":"**COEIN (Non-structural causes):**"},{"t":"point","v":"**C** — Coagulopathy (von Willebrand disease, thrombocytopenia). **O** — Ovulatory dysfunction (PCOS, thyroid). **E** — Endometrial (primary endometrial disorder). **I** — Iatrogenic (hormones, anticoagulants, IUD). **N** — Not yet classified."}],"cardType":"SAQ"},{"id":"gyn-6","num":"Gyn 6","part":"GYN","exam":"paper2","lecture":"Genital Infections","doctor":"Dr. خالد زهران","date":"29 Mar","q":"Mention CDC criteria to diagnose PID.","tags":[],"a":[{"t":"label","v":"Minimum Criteria (any one required for empirical treatment)"},{"t":"point","v":"**Cervical motion tenderness** — pain on manipulation of the cervix during bimanual examination."},{"t":"point","v":"**Uterine tenderness** on palpation."},{"t":"point","v":"**Adnexal tenderness** — unilateral or bilateral."},{"t":"label","v":"Additional Criteria (support diagnosis)"},{"t":"point","v":"Fever > 38.3°C, elevated CRP/ESR, cervical mucopurulent discharge or WBC on wet prep, laboratory evidence of N. gonorrhoeae or C. trachomatis, laparoscopic evidence."}],"cardType":"SAQ"},{"id":"gyn-7","num":"Gyn 7","part":"GYN","exam":"paper2","lecture":"Family Planning I","doctor":"Dr. محمد عادل","date":"15 Mar","q":"Mention 3 absolute contraindications to use COCs.","tags":[],"a":[{"t":"point","v":"**History or current venous thromboembolism (DVT/PE)** or known thrombophilia — oestrogen increases thrombotic risk."},{"t":"point","v":"**Current or history of breast cancer** (oestrogen-sensitive tumour) — relative or absolute depending on severity."},{"t":"point","v":"**Severe cardiovascular disease** — ischaemic heart disease, complicated valvular disease, history of stroke, uncontrolled hypertension, smoker > 35 years old (markedly increases cardiovascular risk)."},{"t":"point","v":"Also absolute: **Active liver disease**, **migraine with aura**, pregnancy, undiagnosed vaginal bleeding."}],"cardType":"SAQ"},{"id":"gyn-8","num":"Gyn 8","part":"GYN","exam":"paper2","lecture":"Family Planning I","doctor":"Dr. محمد عادل","date":"15 Mar","q":"Mechanism of action of copper IUD.","tags":[],"a":[{"t":"point","v":"**Primary mechanism — Toxic to sperm and ovum:** Copper ions released are spermicidal (impair motility and viability) and toxic to the ovum."},{"t":"point","v":"**Foreign body effect:** Induces sterile inflammatory reaction in the endometrium — leucocytes, macrophages, and prostaglandins are inhospitable to fertilisation and implantation."},{"t":"point","v":"**Endometrial changes:** Suppresses endometrial receptivity, making implantation unfavourable even if fertilisation occurs (emergency contraception effect when inserted within 5 days)."},{"t":"point","v":"**Cervical mucus changes:** Copper alters mucus viscosity, impeding sperm penetration."}],"cardType":"SAQ"},{"id":"gyn-9","num":"Gyn 9","part":"GYN","exam":"paper2","lecture":"Uterine Fibroid","doctor":"Dr. ايمن محب","date":"28 Feb","q":"Mention different types of degeneration of fibroid.","tags":[],"a":[{"t":"point","v":"**Hyaline degeneration** — most common; fibrous tissue replaced by homogeneous hyaline material. Painless."},{"t":"point","v":"**Cystic degeneration** — liquefaction of hyaline areas → cysts form."},{"t":"point","v":"**Red (carneous) degeneration** — occurs during pregnancy; ischaemic infarction causing haemorrhage into the fibroid. Presents with acute pain and fever."},{"t":"point","v":"**Calcification** — calcium deposited in long-standing degenerated fibroids; usually postmenopausal."},{"t":"point","v":"**Sarcomatous change (malignant)** — rare (< 0.5%); leiomyosarcoma. Suspect if rapid growth, especially postmenopause."}],"cardType":"SAQ"},{"id":"gyn-10","num":"Gyn 10","part":"GYN","exam":"paper2","lecture":"Endometriosis & Adenomyosis","doctor":"Dr. احمد عز","date":"1 Mar","q":"Define adenomyosis and 3 medical lines of treatment.","tags":[],"a":[{"t":"point","v":"**Definition:** Presence of **endometrial glands and stroma within the myometrium** (uterine muscle), leading to a diffusely enlarged, globular, 'boggy' uterus. Associated with dysmenorrhoea and menorrhagia."},{"t":"label","v":"3 Medical Lines of Treatment"},{"t":"point","v":"**NSAIDs** (e.g. mefenamic acid) — for dysmenorrhoea and pain relief; reduce prostaglandin synthesis."},{"t":"point","v":"**Progestins / Levonorgestrel IUS (Mirena)** — suppress endometrial activity within the myometrium; reduce bleeding and pain. First-line hormonal option."},{"t":"point","v":"**GnRH analogues** (e.g. leuprolide, goserelin) — induce pseudo-menopause; reduce uterine volume and symptoms. Limited to 6 months due to bone loss. Add-back therapy required."}],"cardType":"SAQ"},{"id":"gyn-11","num":"Gyn 11","part":"GYN","exam":"paper2","lecture":"CIN & Cervical Cancer","doctor":"Dr. عماد مصطفي","date":"1 Mar","q":"Define CIN and most important risk factor of cervical cancer.","tags":[],"a":[{"t":"point","v":"**CIN (Cervical Intraepithelial Neoplasia):** Premalignant changes of the squamous epithelium of the cervix — confined above the basement membrane (no invasion). Graded:"},{"t":"point","v":"**CIN 1:** Mild dysplasia — lower 1/3 of epithelium. **CIN 2:** Moderate — lower 2/3. **CIN 3:** Severe dysplasia/carcinoma in situ — full thickness (may progress to invasive cancer)."},{"t":"point","v":"**Most important risk factor of cervical cancer: Persistent infection with high-risk Human Papillomavirus (HPV)** — especially HPV types **16 and 18** (responsible for ~70% of cervical cancers). Almost all cervical cancers are HPV-related."}],"cardType":"SAQ"},{"id":"gyn-12","num":"Gyn 12","part":"GYN","exam":"paper2","lecture":"Ovarian Tumours","doctor":"Dr. كريم شاهين","date":"8 Mar","q":"Mention 3 complications of ovarian cyst.","tags":[],"a":[{"t":"point","v":"**Torsion** — most common complication of ovarian cysts 5–8 cm; sudden severe lower abdominal pain, nausea, vomiting. Emergency surgery required."},{"t":"point","v":"**Rupture** — sudden release of cyst contents into the peritoneal cavity; acute abdominal pain; may cause haemoperitoneum (in endometrioma or dermoid)."},{"t":"point","v":"**Malignant change** — risk is higher in complex cysts with solid components, septations, papillary projections, or bilateral lesions, especially in postmenopausal women."}],"cardType":"SAQ"},{"id":"gyn-13","num":"Gyn 13","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"Enumerate degrees of uterine prolapse.","tags":[],"a":[{"t":"point","v":"**1st degree:** Cervix descends within the vaginal canal but does NOT reach the introitus."},{"t":"point","v":"**2nd degree:** Cervix reaches or protrudes through the introitus (external os at the level of hymen) but the uterine body remains inside."},{"t":"point","v":"**3rd degree (Procidentia):** Complete prolapse — entire uterus protrudes outside the vaginal introitus, including the uterine body. Vaginal vault is inverted."}],"cardType":"SAQ"},{"id":"gyn-14","num":"Gyn 14","part":"GYN","exam":"paper2","lecture":"Genital Fistulas & Perineal Tear","doctor":"Dr. مصطفي كمال","date":"29 Mar","q":"Define vesico-vaginal fistula and its common causes.","tags":[],"a":[{"t":"point","v":"**Definition:** An abnormal communication between the **urinary bladder** and the **vagina**, resulting in continuous involuntary leakage of urine through the vagina."},{"t":"label","v":"Common Causes"},{"t":"point","v":"**Obstructed labour** — most common cause in developing countries; prolonged pressure necrosis of the bladder base against the pubic symphysis."},{"t":"point","v":"**Gynaecological surgery** — total abdominal hysterectomy, anterior repair, or laparoscopic surgery causing inadvertent bladder injury."},{"t":"point","v":"**Radiation therapy** — for pelvic malignancy (cervical cancer); radiation necrosis of tissues."}],"cardType":"SAQ"},{"id":"gyn-15","num":"Gyn 15","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"Define cystocele and rectocele.","tags":[],"a":[{"t":"point","v":"**Cystocele:** Prolapse of the **posterior bladder wall** through a deficient anterior vaginal wall, creating a bulge in the anterior vaginal wall. Presents with: sensation of vaginal fullness, voiding difficulties, stress incontinence, recurrent UTIs."},{"t":"point","v":"**Rectocele:** Prolapse of the **anterior rectal wall** through a deficient posterior vaginal wall, creating a bulge in the posterior vaginal wall. Presents with: difficulty defaecating, need to digitate to evacuate stool, incomplete bowel emptying."}],"cardType":"SAQ"},{"id":"gyn-16","num":"Gyn 16","part":"GYN","exam":"paper2","lecture":"Pelvic Organ Prolapse","doctor":"Dr. عصام ابراهيم","date":"30 Mar","q":"Enumerate 4 indications of TAH (Total Abdominal Hysterectomy).","tags":[],"a":[{"t":"point","v":"**Uterine fibroids** — symptomatic (menorrhagia, pressure symptoms, pain) unresponsive to conservative treatment."},{"t":"point","v":"**Uterine / endometrial malignancy** — endometrial carcinoma, uterine sarcoma, or cervical cancer requiring radical surgery."},{"t":"point","v":"**Genital prolapse** — uterine prolapse (2nd/3rd degree) refractory to pessary treatment in women who have completed their family."},{"t":"point","v":"**Intractable PPH** — massive postpartum haemorrhage uncontrolled by conservative measures (peripartum hysterectomy). Also: chronic pelvic pain, endometriosis, atypical hyperplasia."}],"cardType":"SAQ"},{"id":"gyn-17","num":"Gyn 17","part":"GYN","exam":"paper2","lecture":"Endometriosis & Adenomyosis","doctor":"Dr. احمد عز","date":"1 Mar","q":"Define Endometriosis and its common sites in pelvis.","tags":[],"a":[{"t":"point","v":"**Definition:** Presence of **endometrial glands and stroma outside the uterine cavity**, responding to hormonal stimulation, causing cyclic bleeding, inflammation, fibrosis, and adhesions."},{"t":"label","v":"Common Pelvic Sites (in order of frequency)"},{"t":"point","v":"1. **Ovaries** — most common site; 'chocolate cysts' (endometriomas) filled with dark blood."},{"t":"point","v":"2. **Uterosacral ligaments / Pouch of Douglas** — nodular deposits causing dyspareunia and dysmenorrhoea."},{"t":"point","v":"3. **Pelvic peritoneum** — posterior broad ligament, bladder peritoneum, rectovaginal septum."},{"t":"point","v":"4. Also: Fallopian tubes, bowel (rectosigmoid), ureters, bladder, appendix, umbilicus (rarely)."}],"cardType":"SAQ"},{"id":"gyn-18","num":"Gyn 18","part":"GYN","exam":"paper2","lecture":"CIN & Cervical Cancer","doctor":"Dr. عماد مصطفي","date":"1 Mar","q":"Mention 3 screening methods used for early detection of cervical cancer.","tags":[],"a":[{"t":"point","v":"**Conventional Pap smear (cervical cytology):** Cells scraped from the transformation zone (squamocolumnar junction). Detects CIN and early invasive disease. Sensitivity ~70%."},{"t":"point","v":"**Liquid-based cytology (LBC):** Cells placed in preservative fluid for laboratory processing; reduces inadequate samples; may be combined with HPV testing ('co-testing'). Preferred modern method."},{"t":"point","v":"**High-risk HPV DNA testing:** Identifies persistent high-risk HPV types (16, 18) — the primary cause. Used as primary screening or triage for low-grade cytology results. High sensitivity (> 90%)."}],"cardType":"SAQ"},{"id":"gyn-19","num":"Gyn 19","part":"GYN","exam":"paper2","lecture":"Urinary Incontinence","doctor":"Dr. احمد عزمي","date":"30 Mar","q":"Define stress incontinence & urge incontinence.","tags":[],"a":[{"t":"point","v":"**Stress Urinary Incontinence (SUI):** Involuntary leakage of urine on **effort or exertion** — coughing, sneezing, laughing, lifting — without detrusor overactivity. Cause: weakness of urethral sphincter and/or pelvic floor (urethral hypermobility or intrinsic sphincter deficiency)."},{"t":"point","v":"**Urge Urinary Incontinence (UUI):** Involuntary leakage of urine accompanied by or immediately preceded by a **sudden, compelling urge to void** that cannot be deferred. Cause: overactive bladder (detrusor overactivity) — idiopathic or neurogenic."}],"cardType":"SAQ"},{"id":"gyn-20","num":"Gyn 20","part":"GYN","exam":"paper2","lecture":"Infertility","doctor":"Dr. عبد الحليم السيد","date":"22 Feb","q":"Mention 3 benefits of HSG and 3 contraindications.","tags":[{"cls":"tag-also","txt":"↔ Also in Urinary Incontinence"}],"a":[{"t":"label","v":"3 Benefits of HSG (Hysterosalpingography)"},{"t":"point","v":"**Tubal patency assessment** — identifies bilateral or unilateral tubal blockage (proximal or distal occlusion)."},{"t":"point","v":"**Uterine cavity evaluation** — detects intrauterine pathology: polyps, submucous fibroids, synechiae (Asherman's), septum, congenital anomalies."},{"t":"point","v":"**Therapeutic effect** — oil-based contrast medium may improve fertility by flushing debris and mild peritubal adhesions."},{"t":"label","v":"3 Contraindications"},{"t":"point","v":"**Active pelvic infection (PID)** — risk of spreading infection."},{"t":"point","v":"**Pregnancy** — radiation exposure and risk of abortion."},{"t":"point","v":"**Known contrast allergy (iodine)** — risk of anaphylaxis. Also: unexplained uterine bleeding, recent uterine instrumentation."}],"cardType":"SAQ"},{"id":"gyn-21","num":"Gyn 21","part":"GYN","exam":"paper2","lecture":"Endometrial Hyperplasia & Endometrial Cancer","doctor":"Dr. احمد ربيع","date":"8 Mar","q":"Define endometrial hyperplasia and its types.","tags":[],"a":[{"t":"point","v":"**Definition:** Abnormal proliferation of the **endometrial glands and stroma**, with an increased gland:stroma ratio, resulting from **unopposed oestrogen stimulation** without adequate progesterone effect."},{"t":"label","v":"WHO Classification (2014)"},{"t":"point","v":"**Endometrial Hyperplasia without Atypia** (benign): Glandular overcrowding without nuclear atypia. Risk of progression to carcinoma: **1–3%**. Usually reversible with progestogens."},{"t":"point","v":"**Endometrial Intraepithelial Neoplasia (EIN) / Atypical Hyperplasia**: Nuclear atypia present. Risk of co-existing carcinoma: **~30%**; progression to cancer if untreated. Treatment: hysterectomy in women who have completed childbearing; progestogens if fertility desired."}],"cardType":"SAQ"},{"id":"gyn-22","num":"Gyn 22","part":"GYN","exam":"paper2","lecture":"Infertility","doctor":"Dr. عبد الحليم السيد","date":"22 Feb","q":"Define luteal phase defect.","tags":[],"a":[{"t":"point","v":"**Definition:** Inadequate progesterone secretion from the corpus luteum after ovulation, resulting in insufficient endometrial preparation for implantation and early pregnancy maintenance."},{"t":"point","v":"**Diagnosis:** Endometrial biopsy showing endometrium lagging > 2 days behind expected date; or serum progesterone < 10 ng/mL in mid-luteal phase (day 21)."},{"t":"point","v":"**Clinical significance:** Associated with recurrent early pregnancy loss and infertility. Treatment: progesterone supplementation (vaginal or IM), clomiphene citrate."}],"cardType":"SAQ"},{"id":"gyn-23","num":"Gyn 23","part":"GYN","exam":"paper2","lecture":"Post-partum Haemorrhage (PPH)","doctor":"Dr. محمد توفيق","date":"18 Jan","q":"Causes of chronic inversion of uterus.","tags":[],"a":[{"t":"point","v":"**Definition:** Chronic uterine inversion — the uterine fundus is displaced downwards through the cervix; classified as incomplete (fundus inverts but does not protrude beyond the external os) or complete (uterus protrudes through the introitus)."},{"t":"label","v":"Causes"},{"t":"point","v":"**Unrecognised acute inversion** that was not corrected — acute inversion becomes chronic over time."},{"t":"point","v":"**Fundal tumour** (fibroid or polyp) — gradually pulls the fundus downward by its weight."},{"t":"point","v":"**Neglected chronic inversion** — originally from mismanagement of the third stage of labour (excess cord traction on an uncontracted uterus, fundal pressure without support)."}],"cardType":"SAQ"},{"id":"gyn-24","num":"Gyn 24","part":"GYN","exam":"paper2","lecture":"Infertility","doctor":"Dr. عبد الحليم السيد","date":"22 Feb","q":"Define azoospermia and its types.","tags":[],"a":[{"t":"point","v":"**Definition:** Complete **absence of sperm** in the ejaculate on two separate semen analyses (after centrifugation). Affects ~1% of men and ~15% of infertile men."},{"t":"label","v":"Types"},{"t":"point","v":"**Obstructive azoospermia (OA):** Normal spermatogenesis BUT obstruction in the vas deferens, epididymis, or ejaculatory duct prevents sperm from appearing in the ejaculate. Causes: congenital bilateral absence of vas deferens (CBAVD/CF mutation), vasectomy, post-infective (gonorrhoea), trauma. Testicular biopsy shows normal spermatogenesis."},{"t":"point","v":"**Non-obstructive azoospermia (NOA):** Primary failure of **spermatogenesis**. Causes: Klinefelter syndrome (47,XXY), Y-chromosome microdeletions, cryptorchidism, chemotherapy/radiation, hypogonadotrophic hypogonadism. High FSH, small testes."}],"cardType":"SAQ"},{"id":"gyn-25","num":"Gyn 25","part":"GYN","exam":"paper2","lecture":"Puberty & Menopause","doctor":"Dr. حمزه محمد","date":"15 Feb","q":"Define PMP and most common cause.","tags":[],"a":[{"t":"point","v":"**PMP (Postmenopausal Bleeding):** Any uterine bleeding occurring **12 months or more after the last menstrual period** (menopause). It is a **red flag symptom** requiring investigation to exclude malignancy."},{"t":"label","v":"Most Common Causes (in order)"},{"t":"point","v":"**Atrophic vaginitis / urogenital atrophy** — most common cause overall (~30%); thinned, friable vaginal epithelium from oestrogen deficiency."},{"t":"point","v":"**Endometrial carcinoma** — must be excluded first; accounts for ~10–15% of cases. **The most important cause to rule out.** Investigation: transvaginal ultrasound (endometrial thickness > 4 mm → biopsy) and endometrial biopsy."},{"t":"point","v":"Also: endometrial polyps, HRT use, cervical carcinoma, endometrial hyperplasia."}],"cardType":"SAQ"}];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let deck=[], idx=0, flipped=false, reviewed=0;
let scores={again:0,good:0,easy:0}, mcqRes={correct:0,wrong:0};
let activeFilter='all', activeLec=null, activeLecType='all';

// ═══════════════════════════════════
// FILTER
// ═══════════════════════════════════
function applyFilter(f, lk, lt) {
  if(f   !==undefined) activeFilter   = f;
  if(lk  !==undefined) activeLec      = lk;
  if(lt  !==undefined) activeLecType  = lt;
  let d = [...ALL_CARDS];
  if(activeFilter==='mid')    d=d.filter(c=>c.exam==='mid');
  if(activeFilter==='paper1') d=d.filter(c=>c.exam==='paper1');
  if(activeFilter==='paper2') d=d.filter(c=>c.exam==='paper2');
  if(activeFilter==='obs')    d=d.filter(c=>c.part==='OBS');
  if(activeFilter==='gyn')    d=d.filter(c=>c.part==='GYN');
  if(activeFilter==='mcq')    d=d.filter(c=>c.cardType==='MCQ');
  if(activeFilter==='saq')    d=d.filter(c=>c.cardType==='SAQ');
  if(activeLec) {
    const[l,e,p]=activeLec.split('|||');
    d=d.filter(c=>c.lecture===l&&c.exam===e&&c.part===p);
    if(activeLecType==='mcq') d=d.filter(c=>c.cardType==='MCQ');
    if(activeLecType==='saq') d=d.filter(c=>c.cardType==='SAQ');
  }
  loadDeck(d);
}

function loadDeck(d) {
  deck=d; idx=0; flipped=false; reviewed=0;
  scores={again:0,good:0,easy:0}; mcqRes={correct:0,wrong:0};
  let title='All Questions';
  const labels={mid:'Mid Exam',paper1:'Paper 1',paper2:'Paper 2',obs:'Obstetrics',gyn:'Gynaecology',mcq:'MCQ Only',saq:'SAQ Only'};
  if(activeLec){
    const[l]=activeLec.split('|||');
    title=l+(activeLecType==='mcq'?' — MCQ':activeLecType==='saq'?' — SAQ':'');
  } else if(labels[activeFilter]) title=labels[activeFilter];
  document.getElementById('deck-title').textContent=title;
  const nm=deck.filter(c=>c.cardType==='MCQ').length;
  const ns=deck.filter(c=>c.cardType==='SAQ').length;
  document.getElementById('deck-meta').innerHTML=`<strong>${deck.length}</strong> cards &nbsp;·&nbsp; ${nm} MCQ &nbsp;·&nbsp; ${ns} SAQ`;
  updateStats(); renderCard(); updateNav();
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function renderCard() {
  const stage=document.getElementById('card-stage');
  if(!deck.length){
    stage.innerHTML='<div class="empty"><h3>No cards match this filter</h3><p>Try a different selection.</p></div>';
    document.getElementById('btn-flip').style.display='none'; return;
  }
  document.getElementById('btn-flip').style.display='';
  const c=deck[idx]; flipped=false;
  if(c.cardType==='MCQ'){
    stage.innerHTML=renderMCQ(c);
    const fb=document.getElementById('btn-flip');
    fb.textContent='Select an Answer'; fb.disabled=true; fb.onclick=null;
  } else {
    stage.innerHTML=renderSAQ(c);
    const fb=document.getElementById('btn-flip');
    fb.textContent='Reveal ↕'; fb.disabled=false; fb.onclick=null;
  }
  updateProgress();
}

function renderMCQ(c) {
  const tags=(c.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.txt}</span>`).join('');
  const choices=c.choices.map((ch,i)=>{
    const l='ABCD'[i];
    return `<button class="choice-btn" data-l="${l}" onclick="pick(this,'${l}','${esc(c.ans)}')">
      <span class="c-letter">${l}</span><span style="flex:1">${esc2(ch)}</span>
      <span class="c-icon" id="ci${l}"></span></button>`;
  }).join('');
  return `<div class="mcq-card card-enter">
    <div class="mcq-hdr">
      <div class="mcq-badge">
        <span class="mcq-qn">${esc2(c.num)}</span>
        <span class="mcq-tag">MCQ</span>
        <span class="mcq-tag">${c.part}</span>
        <span class="mcq-tag">${examLabel(c.exam)}</span>
      </div>
      <div class="mcq-lec">${esc2(c.lecture)} &nbsp;·&nbsp; ${esc2(c.doctor)} (${esc2(c.date)})</div>
    </div>
    <div class="mcq-stem">${esc2(c.q)}</div>
    ${tags?'<div class="mcq-tags">'+tags+'</div>':''}
    <div class="mcq-choices">${choices}</div>
    <div class="mcq-result" id="mcq-res"></div>
    <div class="mcq-footer">
      <span style="font-size:.72rem;color:#6b7280">Click a choice to answer</span>
      <div class="rate-btns" id="mcq-rate" style="display:none">
        <button class="rate-btn rb-again" onclick="rate('again')">✗ Again</button>
        <button class="rate-btn rb-good"  onclick="rate('good')">~ Good</button>
        <button class="rate-btn rb-easy"  onclick="rate('easy')">✓ Easy</button>
      </div>
    </div>
  </div>`;
}

function pick(btn, chosen, correct) {
  document.querySelectorAll('.choice-btn').forEach(b=>{b.classList.add('locked');b.onclick=null;});
  const ok=(chosen===correct);
  btn.classList.add(ok?'chosen-correct':'chosen-wrong');
  document.getElementById('ci'+chosen).textContent=ok?'✓':'✗';
  if(!ok){
    const cb=document.querySelector('.choice-btn[data-l="'+correct+'"]');
    if(cb){cb.classList.add('reveal-correct');document.getElementById('ci'+correct).textContent='✓';}
  }
  const res=document.getElementById('mcq-res');
  if(ok){res.className='mcq-result ok';res.textContent='✓ Correct!';mcqRes.correct++;}
  else{res.className='mcq-result ng';res.innerHTML='✗ Incorrect. Correct answer: <strong>'+correct+'</strong>';mcqRes.wrong++;}
  document.getElementById('mcq-rate').style.display='flex';
  const fb=document.getElementById('btn-flip');
  fb.disabled=false; fb.textContent='Next →';
  fb.onclick=function(){nextCard();fb.onclick=null;fb.textContent='Select an Answer';};
  flipped=true; reviewed++; updateStats(); updateProgress();
}

function renderSAQ(c) {
  const tags=(c.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.txt}</span>`).join('');
  const ansHTML=(c.a||[]).map(pt=>{
    if(pt.t==='label') return `<div class="ans-label">${esc2(pt.v)}</div>`;
    return `<div class="ans-pt"><span class="pt-bull">▸</span><span>${mdBold(esc2(pt.v))}</span></div>`;
  }).join('');
  return `<div class="card-flip card-enter" id="card-flip">
    <div class="card-face card-front" onclick="flipCard()">
      <div class="cf-body">
        <div class="q-badge"><span>${esc2(c.num)}</span><span class="ttype">SAQ</span><span>${c.part}</span></div>
        <div class="q-lec">${esc2(c.lecture)} — ${esc2(c.doctor)} (${esc2(c.date)})</div>
        <div class="q-text">${esc2(c.q)}</div>
        ${tags?'<div class="q-tags">'+tags+'</div>':''}
        <div class="q-hint">👁 Click card or press Space to reveal</div>
      </div>
      <div class="flip-cta">✦ REVEAL ANSWER ✦</div>
    </div>
    <div class="card-face card-back card-back-saq">
      <div class="ans-hdr"><div><div style="font-size:.68rem;opacity:.7;text-transform:uppercase;letter-spacing:.1em">Model Answer</div>
        <div class="ans-hdr-q">${esc2(c.q)}</div></div></div>
      <div class="ans-body">${ansHTML}</div>
      <div class="ans-footer">
        <span style="font-size:.71rem;color:#6b7280">How well did you know this?</span>
        <div class="rate-btns">
          <button class="rate-btn rb-again" onclick="rate('again')">✗ Again</button>
          <button class="rate-btn rb-good"  onclick="rate('good')">~ Good</button>
          <button class="rate-btn rb-easy"  onclick="rate('easy')">✓ Easy</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════
// FLIP / NAV / RATE
// ═══════════════════════════════════
function flipCard(){
  const f=document.getElementById('card-flip'); if(!f)return;
  flipped=!flipped; f.classList.toggle('flipped',flipped);
  if(flipped){reviewed++;updateStats();updateProgress();}
}
function flipCurrent(){
  const c=deck[idx]; if(!c)return;
  if(c.cardType==='SAQ') flipCard();
}
function nextCard(){
  if(idx>=deck.length-1){showScore();return;}
  idx++; renderCard(); updateNav();
}
function prevCard(){
  if(idx<=0)return; idx--; renderCard(); updateNav();
}
function rate(v){ scores[v]++; nextCard(); }
function shuffleDeck(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;flipped=false;reviewed=0;scores={again:0,good:0,easy:0};mcqRes={correct:0,wrong:0};
  renderCard();updateNav();updateStats();
}
function resetDeck(){
  idx=0;flipped=false;reviewed=0;scores={again:0,good:0,easy:0};mcqRes={correct:0,wrong:0};
  renderCard();updateNav();updateStats();
}

// ═══════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════
function updateNav(){
  document.getElementById('btn-prev').disabled=(idx===0);
  document.getElementById('btn-next').disabled=(idx>=deck.length-1);
  document.getElementById('nav-ctr').textContent=deck.length?`${idx+1} / ${deck.length}`:'— / —';
}
function updateProgress(){
  const tot=deck.length, done=Math.min(idx+(flipped?1:0),tot), pct=tot?Math.round(done/tot*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${done} / ${tot}`;
  document.getElementById('prog-pct').textContent=pct+'%';
}
function updateStats(){
  document.getElementById('s-total').textContent=deck.length;
  document.getElementById('s-mcq').textContent=deck.filter(c=>c.cardType==='MCQ').length;
  document.getElementById('s-saq').textContent=deck.filter(c=>c.cardType==='SAQ').length;
  document.getElementById('s-rev').textContent=reviewed;
  const nm=deck.filter(c=>c.cardType==='MCQ').length, done=mcqRes.correct+mcqRes.wrong;
  document.getElementById('s-score').textContent=nm&&done?`${mcqRes.correct}/${done}`:'—';
}

// ═══════════════════════════════════
// SCORE
// ═══════════════════════════════════
function showScore(){
  const nm=deck.filter(c=>c.cardType==='MCQ').length, ns=deck.length-nm;
  const pct=nm?(mcqRes.correct/nm):0;
  document.getElementById('sc-emoji').textContent=pct>.75?'🏆':pct>.5?'⭐':'📖';
  document.getElementById('sc-sub').textContent=`${deck.length} cards reviewed (${nm} MCQ · ${ns} SAQ)`;
  let g='';
  if(nm) g+=`<div class="sc-stat ok"><div class="sc-n">${mcqRes.correct}</div><div class="sc-l">Correct MCQ</div></div>
    <div class="sc-stat ng"><div class="sc-n">${mcqRes.wrong}</div><div class="sc-l">Wrong MCQ</div></div>`;
  if(ns) g+=`<div class="sc-stat ag"><div class="sc-n">${scores.again}</div><div class="sc-l">Again</div></div>
    <div class="sc-stat gd"><div class="sc-n">${scores.good}</div><div class="sc-l">Good</div></div>
    <div class="sc-stat ez"><div class="sc-n">${scores.easy}</div><div class="sc-l">Easy</div></div>`;
  document.getElementById('sc-grid').innerHTML=g;
  document.getElementById('score-overlay').classList.add('visible');
}
function closeScore(){ document.getElementById('score-overlay').classList.remove('visible'); }

// ═══════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════
function buildSidebar(){
  const list=document.getElementById('sb-list');
  const seen=new Set(); const groups=[];
  ALL_CARDS.forEach(c=>{
    const k=c.lecture+'|||'+c.exam+'|||'+c.part;
    if(!seen.has(k)){seen.add(k);groups.push({k,lecture:c.lecture,exam:c.exam,part:c.part,doctor:c.doctor,date:c.date});}
  });
  const parts=[{label:'🔬 OBSTETRICS',part:'OBS'},{label:'🩺 GYNAECOLOGY',part:'GYN'}];
  let html='';
  parts.forEach(({label,part})=>{
    const items=groups.filter(g=>g.part===part); if(!items.length)return;
    html+=`<li class="sb-item sb-part"><div class="s-main" style="cursor:default">${label}</div></li>`;
    items.forEach(g=>{
      const nA=ALL_CARDS.filter(c=>c.lecture===g.lecture&&c.exam===g.exam&&c.part===g.part).length;
      const nM=ALL_CARDS.filter(c=>c.lecture===g.lecture&&c.exam===g.exam&&c.part===g.part&&c.cardType==='MCQ').length;
      const nS=ALL_CARDS.filter(c=>c.lecture===g.lecture&&c.exam===g.exam&&c.part===g.part&&c.cardType==='SAQ').length;
      const eb=g.exam==='mid'?'Mid':g.exam==='paper1'?'P1':'P2';
      const sid='sub_'+g.k.replace(/[^a-z0-9]/gi,'_');
      const sub=(nM&&nS)?
        `<div class="s-subtabs" id="${sid}">
           <button class="s-stab on" onclick="setST(event,'${g.k}','all')">All(${nA})</button>
           <button class="s-stab mcq-t" onclick="setST(event,'${g.k}','mcq')">MCQ(${nM})</button>
           <button class="s-stab saq-t" onclick="setST(event,'${g.k}','saq')">SAQ(${nS})</button>
         </div>`:'';
      html+=`<li class="sb-item" data-k="${g.k}" onclick="setSL('${g.k}')">
        <div class="s-main">
          <span class="s-name">${g.lecture} <span style="opacity:.5;font-size:.63rem">[${eb}]</span></span>
          <span class="s-cnt">${nA}</span>
        </div>${sub}</li>`;
    });
  });
  list.innerHTML=html;
}

function setSL(k){
  document.querySelectorAll('.sb-item[data-k]').forEach(el=>el.classList.remove('active'));
  const el=document.querySelector('.sb-item[data-k="'+k+'"]'); if(el)el.classList.add('active');
  activeLec=k; activeLecType='all';
  const sid='sub_'+k.replace(/[^a-z0-9]/gi,'_');
  const sub=document.getElementById(sid);
  if(sub) sub.querySelectorAll('.s-stab').forEach((b,i)=>b.classList.toggle('on',i===0));
  applyFilter(undefined,k,'all');
}
function setST(e,k,t){
  e.stopPropagation();
  const sid='sub_'+k.replace(/[^a-z0-9]/gi,'_');
  const sub=document.getElementById(sid);
  if(sub){sub.querySelectorAll('.s-stab').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');}
  applyFilter(undefined,k,t);
}

// ═══════════════════════════════════
// COUNTS
// ═══════════════════════════════════
function updateCounts(){
  const ids={all:ALL_CARDS.length,mid:0,p1:0,p2:0,obs:0,gyn:0,mcq:0,saq:0};
  ALL_CARDS.forEach(c=>{
    if(c.exam==='mid')ids.mid++;
    if(c.exam==='paper1')ids.p1++;
    if(c.exam==='paper2')ids.p2++;
    if(c.part==='OBS')ids.obs++;
    if(c.part==='GYN')ids.gyn++;
    if(c.cardType==='MCQ')ids.mcq++;
    if(c.cardType==='SAQ')ids.saq++;
  });
  Object.entries(ids).forEach(([k,v])=>{const el=document.getElementById('c-'+k);if(el)el.textContent=v;});
}

// ═══════════════════════════════════
// TOP FILTER TABS
// ═══════════════════════════════════
document.querySelectorAll('.ftab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeLec=null; activeLecType='all';
    document.querySelectorAll('.sb-item[data-k]').forEach(el=>el.classList.remove('active'));
    applyFilter(tab.dataset.f,null,'all');
  });
});

// ═══════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const c=deck[idx]; if(!c)return;
  if(e.code==='Space'&&c.cardType==='SAQ'){e.preventDefault();flipCard();}
  if(e.code==='ArrowRight')nextCard();
  if(e.code==='ArrowLeft')prevCard();
  if(flipped){if(e.key==='1')rate('again');if(e.key==='2')rate('good');if(e.key==='3')rate('easy');}
});
document.getElementById('score-overlay').addEventListener('click',function(e){if(e.target===this)closeScore();});

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function examLabel(e){return e==='mid'?'Mid Exam':e==='paper1'?'Paper 1':'Paper 2';}
function mdBold(str){return str.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}
function esc(str){return String(str).replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
function esc2(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
buildSidebar();
updateCounts();
applyFilter('all',null,'all');
</script>
</body>
</html>
